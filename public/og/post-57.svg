<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg57" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1F2E"/>
      <stop offset="100%" stop-color="#05080E"/>
    </linearGradient>
    <radialGradient id="g57a" cx="0.2" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g57b" cx="0.8" cy="0.65" r="0.55">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg57)"/>
  <rect width="800" height="500" fill="url(#g57a)"/>
  <rect width="800" height="500" fill="url(#g57b)"/>

  <!-- VS divider -->
  <g transform="translate(400,250)">

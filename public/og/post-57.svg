    <text x="0" y="7" text-anchor="middle" font-family="Inter,system-ui" font-size="20" font-weight="800" fill="#fff">VS</text>
  </g>

  <!-- Left: Sin web panel -->
  <g transform="translate(80,110)">
    <rect width="270" height="280" rx="16" fill="rgba(5,8,14,0.85)" stroke="rgba(249,115,22,0.45)"/>
    <text x="24" y="42" font-family="Inter,system-ui" font-size="18" font-weight="800" fill="#fff">Solo redes</text>
    <text x="24" y="64" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="2">INSTAGRAM + WHATSAPP</text>

    <g font-family="ui-monospace,monospace" font-size="11">
      <text x="24" y="104" fill="rgba(255,255,255,0.75)">Visibilidad en Google</text>
      <rect x="24" y="114" width="222" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>
      <rect x="24" y="114" width="70" height="10" rx="5" fill="rgba(249,115,22,0.8)"/>
      <text x="24" y="148" fill="rgba(255,255,255,0.55)">casi nula</text>

      <text x="24" y="190" fill="rgba(255,255,255,0.7)">⚠ No te encuentran</text>
      <text x="24" y="216" fill="rgba(255,255,255,0.7)">⚠ Sin marca propia</text>
      <text x="24" y="242" fill="rgba(255,255,255,0.7)">⚠ Dependes del algoritmo</text>
    </g>
  </g>

  <!-- Right: Con web panel -->
  <g transform="translate(450,110)">
    <rect width="270" height="280" rx="16" fill="rgba(5,8,14,0.85)" stroke="rgba(20,184,166,0.55)"/>
    <text x="24" y="42" font-family="Inter,system-ui" font-size="18" font-weight="800" fill="#fff">Con web</text>
    <text x="24" y="64" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="2">AUTÓNOMO · A MEDIDA</text>

    <g font-family="ui-monospace,monospace" font-size="11">
      <text x="24" y="104" fill="rgba(255,255,255,0.75)">Visibilidad en Google</text>
      <rect x="24" y="114" width="222" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>
      <rect x="24" y="114" width="210" height="10" rx="5" fill="rgba(34,197,94,0.85)"/>
      <text x="24" y="148" fill="rgba(255,255,255,0.55)">SEO local activo</text>

      <text x="24" y="190" fill="rgba(255,255,255,0.7)">✓ Te encuentran 24/7</text>
      <text x="24" y="216" fill="rgba(255,255,255,0.7)">✓ Marca tuya</text>
      <text x="24" y="242" fill="rgba(255,255,255,0.7)">✓ Captas clientes</text>
    </g>
  </g>

  <text x="400" y="78" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.55)" letter-spacing="4">WEB PARA AUTÓNOMOS</text>

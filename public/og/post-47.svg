<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg47" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g47a" cx="0.7" cy="0.25" r="0.55">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g47b" cx="0.2" cy="0.75" r="0.55">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg47)"/>
  <rect width="800" height="500" fill="url(#g47a)"/>
  <rect width="800" height="500" fill="url(#g47b)"/>

  <!-- Business profile card -->
  <g transform="translate(150,75)" opacity="0.95">
    <rect x="0" y="0" width="320" height="350" rx="18" fill="rgba(7,5,14,0.85)" stroke="rgba(59,130,246,0.45)"/>
    <!-- photo grid -->
    <g transform="translate(20,20)">
      <rect x="0" y="0" width="184" height="100" rx="10" fill="rgba(59,130,246,0.25)"/>
      <!-- storefront -->
      <g transform="translate(52,22)">
        <rect x="0" y="22" width="80" height="38" rx="3" fill="rgba(255,255,255,0.18)"/>
        <path d="M-6 22 L40 0 L86 22 Z" fill="rgba(251,191,36,0.5)"/>
        <rect x="32" y="36" width="16" height="24" rx="2" fill="rgba(7,5,14,0.6)"/>
      </g>
      <rect x="192" y="0" width="88" height="46" rx="8" fill="rgba(139,92,246,0.25)"/>
      <rect x="192" y="54" width="88" height="46" rx="8" fill="rgba(249,115,22,0.25)"/>
    </g>

    <text x="20" y="152" font-family="Inter,system-ui" font-size="17" font-weight="800" fill="#fff">Tu negocio</text>
    <text x="20" y="174" font-family="ui-monospace,monospace" font-size="11" fill="#FBBF24">★★★★★ 4.9 · 132 reseñas</text>
    <text x="20" y="194" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.55)">Categoria exacta · Abierto ahora</text>

    <!-- action buttons -->
    <g transform="translate(20,212)">
      <rect x="0" y="0" width="86" height="32" rx="16" fill="rgba(59,130,246,0.25)" stroke="rgba(59,130,246,0.6)"/>
      <text x="43" y="20" text-anchor="middle" font-family="Inter,system-ui" font-size="11" font-weight="600" fill="#fff">Llamar</text>
      <rect x="96" y="0" width="86" height="32" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)"/>
      <text x="139" y="20" text-anchor="middle" font-family="Inter,system-ui" font-size="11" fill="rgba(255,255,255,0.8)">Como llegar</text>
      <rect x="192" y="0" width="86" height="32" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)"/>
      <text x="235" y="20" text-anchor="middle" font-family="Inter,system-ui" font-size="11" fill="rgba(255,255,255,0.8)">Sitio web</text>
    </g>

    <!-- review -->
    <g transform="translate(20,262)">
      <rect x="0" y="0" width="280" height="64" rx="10" fill="rgba(255,255,255,0.04)"/>
      <circle cx="22" cy="22" r="11" fill="rgba(251,191,36,0.4)"/>
      <text x="22" y="26" text-anchor="middle" font-family="Inter,system-ui" font-size="11" font-weight="700" fill="#fff">M</text>
      <text x="42" y="18" font-family="ui-monospace,monospace" font-size="9" fill="#FBBF24">★★★★★</text>
      <rect x="42" y="26" width="200" height="5" rx="2.5" fill="rgba(255,255,255,0.18)"/>
      <rect x="42" y="37" width="160" height="5" rx="2.5" fill="rgba(255,255,255,0.12)"/>
      <text x="14" y="56" font-family="ui-monospace,monospace" font-size="8" fill="rgba(34,197,94,0.85)">respondida por el propietario</text>
    </g>
  </g>

  <!-- Stats panel -->
  <g transform="translate(510,120)" opacity="0.95">
    <rect x="0" y="0" width="180" height="260" rx="14" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.13)"/>
    <text x="18" y="30" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="2">RENDIMIENTO</text>

    <g transform="translate(18,48)">
      <text x="0" y="14" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.5)">llamadas</text>
      <text x="0" y="36" font-family="Inter,system-ui" font-size="20" font-weight="800" fill="#3B82F6">+184%</text>
    </g>
    <g transform="translate(18,108)">
      <text x="0" y="14" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.5)">como llegar</text>
      <text x="0" y="36" font-family="Inter,system-ui" font-size="20" font-weight="800" fill="#FBBF24">+97%</text>
    </g>
    <g transform="translate(18,168)">
      <text x="0" y="14" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.5)">clics a la web</text>
      <text x="0" y="36" font-family="Inter,system-ui" font-size="20" font-weight="800" fill="#8B5CF6">+122%</text>
    </g>
    <g transform="translate(18,222)">
      <circle cx="8" cy="8" r="8" fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.7)" stroke-width="1.5"/>
      <path d="M4 8 L7 11 L12 5" stroke="#22C55E" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      <text x="24" y="12" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.6)">ficha verificada</text>
    </g>
  </g>

  <text x="400" y="458" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="rgba(255,255,255,0.55)" letter-spacing="3">GOOGLE BUSINESS PROFILE · GUIA</text>
</svg>

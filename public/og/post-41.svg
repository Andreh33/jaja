<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg41" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g41a" cx="0.75" cy="0.25" r="0.55">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g41b" cx="0.2" cy="0.8" r="0.55">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg41)"/>
  <rect width="800" height="500" fill="url(#g41a)"/>
  <rect width="800" height="500" fill="url(#g41b)"/>

  <!-- Browser with search results -->
  <g transform="translate(120,100)" opacity="0.95">
    <rect x="0" y="0" width="360" height="300" rx="16" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.14)"/>
    <!-- browser top bar -->
    <circle cx="22" cy="22" r="5" fill="rgba(239,68,68,0.7)"/>
    <circle cx="40" cy="22" r="5" fill="rgba(251,191,36,0.7)"/>
    <circle cx="58" cy="22" r="5" fill="rgba(34,197,94,0.7)"/>
    <!-- search bar -->
    <rect x="24" y="44" width="312" height="36" rx="18" fill="rgba(255,255,255,0.07)" stroke="rgba(139,92,246,0.45)"/>
    <circle cx="44" cy="62" r="7" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <line x1="50" y1="68" x2="57" y2="75" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <text x="66" y="66" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.6)">tu servicio en tu ciudad</text>

    <!-- result 1 highlighted -->
    <g transform="translate(24,100)">
      <rect x="0" y="0" width="312" height="58" rx="10" fill="rgba(139,92,246,0.16)" stroke="rgba(139,92,246,0.5)"/>
      <text x="14" y="22" font-family="Inter,system-ui" font-size="12" font-weight="700" fill="#A78BFA">Tu negocio — primera posicion</text>
      <rect x="14" y="32" width="220" height="6" rx="3" fill="rgba(255,255,255,0.25)"/>
      <rect x="14" y="44" width="160" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
    </g>
    <!-- result 2 -->
    <g transform="translate(24,168)">
      <rect x="0" y="0" width="312" height="46" rx="10" fill="rgba(255,255,255,0.04)"/>
      <rect x="14" y="14" width="180" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
      <rect x="14" y="28" width="240" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    </g>
    <!-- result 3 -->
    <g transform="translate(24,224)">
      <rect x="0" y="0" width="312" height="46" rx="10" fill="rgba(255,255,255,0.04)"/>
      <rect x="14" y="14" width="150" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
      <rect x="14" y="28" width="210" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    </g>
  </g>

  <!-- Indexing status panel -->
  <g transform="translate(520,130)" opacity="0.95">
    <rect x="0" y="0" width="190" height="240" rx="14" fill="rgba(7,5,14,0.85)" stroke="rgba(59,130,246,0.4)"/>
    <text x="20" y="32" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="2">SEARCH CONSOLE</text>

    <g transform="translate(20,54)">
      <circle cx="10" cy="10" r="10" fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.7)" stroke-width="1.5"/>
      <path d="M5 10 L8.5 13.5 L15 6.5" stroke="#22C55E" stroke-width="2" stroke-linecap="round" fill="none"/>
      <text x="30" y="14" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.8)">rastreada</text>
    </g>
    <g transform="translate(20,86)">
      <circle cx="10" cy="10" r="10" fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.7)" stroke-width="1.5"/>
      <path d="M5 10 L8.5 13.5 L15 6.5" stroke="#22C55E" stroke-width="2" stroke-linecap="round" fill="none"/>
      <text x="30" y="14" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.8)">indexada</text>
    </g>
    <g transform="translate(20,118)">
      <circle cx="10" cy="10" r="10" fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.7)" stroke-width="1.5"/>
      <path d="M5 10 L8.5 13.5 L15 6.5" stroke="#22C55E" stroke-width="2" stroke-linecap="round" fill="none"/>
      <text x="30" y="14" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.8)">sitemap OK</text>
    </g>

    <!-- impressions sparkline -->
    <rect x="20" y="156" width="150" height="60" rx="8" fill="rgba(255,255,255,0.04)"/>
    <polyline points="30,202 55,196 80,190 105,178 130,168 160,152" fill="none" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="160" cy="152" r="4" fill="#8B5CF6"/>
    <text x="30" y="172" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.45)">impresiones</text>
  </g>

  <text x="400" y="448" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="rgba(255,255,255,0.55)" letter-spacing="3">APARECER EN GOOGLE · 2026</text>
</svg>

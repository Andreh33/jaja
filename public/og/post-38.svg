<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg38" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g38a" cx="0.3" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g38b" cx="0.85" cy="0.7" r="0.5">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg38)"/>
  <rect width="800" height="500" fill="url(#g38a)"/>
  <rect width="800" height="500" fill="url(#g38b)"/>

  <!-- Phone with missed call badge -->
  <g transform="translate(200,200)">
    <circle r="95" fill="none" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
    <circle r="50" fill="rgba(7,5,14,0.92)" stroke="rgba(239,68,68,0.8)" stroke-width="2"/>
    <text y="9" text-anchor="middle" font-family="Inter,system-ui" font-size="24">📵</text>
    <!-- badge -->
    <g transform="translate(42,-42)">
      <circle r="20" fill="#EF4444"/>
      <text y="5" text-anchor="middle" font-family="Inter,system-ui" font-size="14" font-weight="800" fill="#fff">27</text>
    </g>
    <text y="86" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="rgba(239,68,68,0.8)">perdidas este mes</text>
  </g>

  <!-- euros escaping (falling coins) -->
  <g font-family="ui-monospace,monospace" font-size="14" fill="rgba(251,191,36,0.8)">
    <text x="330" y="140" opacity="0.9">€</text>
    <text x="360" y="190" opacity="0.7">€</text>
    <text x="340" y="250" opacity="0.5">€</text>
    <text x="365" y="310" opacity="0.35">€</text>
    <text x="345" y="365" opacity="0.2">€</text>
  </g>

  <!-- Loss list -->
  <g transform="translate(440,95)" font-family="ui-monospace,monospace">
    <rect width="270" height="220" rx="14" fill="rgba(7,5,14,0.88)" stroke="rgba(239,68,68,0.45)" stroke-width="1.5"/>
    <text x="20" y="32" font-size="12" fill="rgba(255,255,255,0.6)">COSTE / MES SIN CONTESTAR</text>
    <text x="20" y="66" font-size="12" fill="rgba(255,255,255,0.85)">🍽 restaurante  −2.300€</text>
    <text x="20" y="98" font-size="12" fill="rgba(255,255,255,0.85)">🦷 clínica      −1.800€</text>
    <text x="20" y="130" font-size="12" fill="rgba(255,255,255,0.85)">💇 peluquería   −1.100€</text>
    <text x="20" y="162" font-size="12" fill="rgba(255,255,255,0.85)">🔧 taller         −900€</text>
    <text x="20" y="196" font-size="11" fill="rgba(239,68,68,0.85)">80% no vuelve a llamar ↓</text>
  </g>

  <!-- Solution chip -->
  <g transform="translate(440,345)" font-family="ui-monospace,monospace">
    <rect width="270" height="44" rx="12" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.6)" stroke-width="1.5"/>
    <text x="135" y="27" text-anchor="middle" font-size="11" fill="#A78BFA">solución: agente IA · 0 perdidas ✓</text>
  </g>

  <text x="400" y="470" text-anchor="middle" font-family="Inter,system-ui" font-size="11" font-weight="700" fill="rgba(255,255,255,0.45)" letter-spacing="4">LLAMADAS PERDIDAS · LATECH</text>
</svg>

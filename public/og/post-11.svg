<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0F26"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g11a" cx="0.2" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#635BFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#635BFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g11b" cx="0.85" cy="0.7" r="0.55">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg11)"/>
  <rect width="800" height="500" fill="url(#g11a)"/>
  <rect width="800" height="500" fill="url(#g11b)"/>

  <!-- 4 pasarelas, 2x2 grid -->
  <g transform="translate(110,110)">
    <!-- Stripe -->
    <g>
      <rect width="280" height="130" rx="16" fill="rgba(99,91,255,0.18)" stroke="rgba(99,91,255,0.6)"/>
      <text x="24" y="42" font-family="Inter,system-ui" font-size="22" font-weight="800" fill="#fff" letter-spacing="-1">stripe</text>
      <text x="24" y="78" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.85)">1.4% + 0.25€</text>
      <text x="24" y="100" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.55)">API limpia · multi-país</text>
      <g transform="translate(220,30)">
        <rect width="40" height="22" rx="11" fill="rgba(34,197,94,0.25)"/>
        <text x="20" y="15" text-anchor="middle" font-family="Inter,system-ui" font-size="9" font-weight="700" fill="#22C55E">★</text>
      </g>
    </g>

    <!-- Redsys -->
    <g transform="translate(300,0)">
      <rect width="280" height="130" rx="16" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.18)"/>
      <text x="24" y="42" font-family="Inter,system-ui" font-size="22" font-weight="800" fill="#fff" letter-spacing="-1">Redsys</text>
      <text x="24" y="78" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.85)">según banco</text>
      <text x="24" y="100" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.55)">integración del 1995</text>
    </g>

    <!-- Bizum -->
    <g transform="translate(0,150)">
      <rect width="280" height="130" rx="16" fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.6)"/>
      <text x="24" y="42" font-family="Inter,system-ui" font-size="22" font-weight="800" fill="#fff" letter-spacing="-1">Bizum</text>
      <text x="24" y="78" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.85)">1.5% · 40M usuarios ES</text>
      <text x="24" y="100" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.55)">caballo ganador local</text>
      <g transform="translate(220,30)">
        <rect width="40" height="22" rx="11" fill="rgba(34,197,94,0.25)"/>
        <text x="20" y="15" text-anchor="middle" font-family="Inter,system-ui" font-size="9" font-weight="700" fill="#22C55E">★</text>
      </g>
    </g>

    <!-- PayPal -->
    <g transform="translate(300,150)">
      <rect width="280" height="130" rx="16" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.18)"/>
      <text x="24" y="42" font-family="Inter,system-ui" font-size="22" font-weight="800" fill="#fff" letter-spacing="-1">PayPal</text>
      <text x="24" y="78" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.85)">3.4% + 0.35€</text>
      <text x="24" y="100" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.55)">cara · pero la gente confía</text>
    </g>
  </g>

  <text x="400" y="460" text-anchor="middle" font-family="Inter,system-ui" font-size="11" font-weight="700" fill="rgba(255,255,255,0.45)" letter-spacing="4">PASARELAS DE PAGO · ESPAÑA 2026</text>
</svg>

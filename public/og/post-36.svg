<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg36" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g36a" cx="0.5" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g36b" cx="0.15" cy="0.8" r="0.55">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg36)"/>
  <rect width="800" height="500" fill="url(#g36a)"/>
  <rect width="800" height="500" fill="url(#g36b)"/>

  <!-- Cost comparison bars -->
  <g font-family="ui-monospace,monospace">
    <!-- baseline -->
    <line x1="120" y1="370" x2="680" y2="370" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

    <!-- Empleado -->
    <g transform="translate(160,0)">
      <rect x="0" y="130" width="110" height="240" rx="10" fill="rgba(239,68,68,0.22)" stroke="rgba(239,68,68,0.6)" stroke-width="1.5"/>
      <text x="55" y="115" text-anchor="middle" font-size="14" fill="#EF4444" font-weight="bold">1.400€/mes</text>
      <text x="55" y="395" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.75)">👤 empleado</text>
      <text x="55" y="414" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.45)">20h/sem · 1 llamada</text>
    </g>

    <!-- Centralita -->
    <g transform="translate(350,0)">
      <rect x="0" y="290" width="110" height="80" rx="10" fill="rgba(59,130,246,0.18)" stroke="rgba(59,130,246,0.55)" stroke-width="1.5"/>
      <text x="55" y="275" text-anchor="middle" font-size="14" fill="#3B82F6" font-weight="bold">90€/mes</text>
      <text x="55" y="395" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.75)">☎ centralita</text>
      <text x="55" y="414" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.45)">enruta · no resuelve</text>
    </g>

    <!-- Agente IA -->
    <g transform="translate(540,0)">
      <rect x="0" y="320" width="110" height="50" rx="10" fill="rgba(139,92,246,0.25)" stroke="rgba(139,92,246,0.85)" stroke-width="2"/>
      <text x="55" y="305" text-anchor="middle" font-size="14" fill="#A78BFA" font-weight="bold">150€/mes</text>
      <text x="55" y="395" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.75)">🤖 agente IA</text>
      <text x="55" y="414" text-anchor="middle" font-size="9" fill="#FBBF24">24/7 · resuelve ✓</text>
      <!-- highlight ring -->
      <circle cx="55" cy="345" r="44" fill="none" stroke="rgba(251,191,36,0.4)" stroke-dasharray="4 4"/>
    </g>
  </g>

  <!-- title chip -->
  <g transform="translate(260,48)" font-family="ui-monospace,monospace">
    <rect width="280" height="40" rx="20" fill="rgba(7,5,14,0.85)" stroke="rgba(251,191,36,0.5)"/>
    <text x="140" y="25" text-anchor="middle" font-size="12" fill="#FBBF24">💶 precios 2026 · comparativa</text>
  </g>

  <text x="400" y="470" text-anchor="middle" font-family="Inter,system-ui" font-size="11" font-weight="700" fill="rgba(255,255,255,0.45)" letter-spacing="4">CUÁNTO CUESTA UN AGENTE IA · LATECH</text>
</svg>

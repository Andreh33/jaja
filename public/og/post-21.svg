  <g transform="translate(120,250)" opacity="0.9">
    <rect x="0" y="0" width="290" height="170" rx="14" fill="rgba(7,5,14,0.88)" stroke="rgba(255,255,255,0.16)" stroke-width="1.5"/>
    <text x="18" y="28" font-family="ui-monospace,monospace" font-size="11" fill="#F97316" font-weight="bold">CLASES · HOY</text>

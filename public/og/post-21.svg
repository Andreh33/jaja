    <text x="30" y="133" font-family="ui-monospace,monospace" font-size="11" fill="#FFFFFF">19:30 fuerza · completa</text>
  </g>

  <!-- Lead capture + video card -->
  <g transform="translate(470,100)" opacity="0.9">
    <rect x="0" y="0" width="230" height="140" rx="14" fill="rgba(7,5,14,0.88)" stroke="rgba(255,255,255,0.16)" stroke-width="1.5"/>
    <!-- play button -->
    <circle cx="115" cy="56" r="30" fill="rgba(59,130,246,0.2)" stroke="#3B82F6" stroke-width="2"/>
    <path d="M106 40 L132 56 L106 72 Z" fill="#3B82F6"/>
    <text x="115" y="118" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.55)">vídeo · así entrenamos</text>

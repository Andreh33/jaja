    <rect x="18" y="78" width="254" height="28" rx="7" fill="rgba(59,130,246,0.35)"/>
    <text x="30" y="97" font-family="ui-monospace,monospace" font-size="11" fill="#FFFFFF">18:00 spinning · 5 plazas</text>

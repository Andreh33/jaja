  <g transform="translate(470,270)" opacity="0.9">
    <rect x="0" y="0" width="230" height="130" rx="14" fill="rgba(7,5,14,0.88)" stroke="rgba(255,255,255,0.16)" stroke-width="1.5"/>
    <text x="16" y="28" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.55)">sesión de prueba GRATIS</text>

        <path d="M5 11 L10 16 L17 6" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <text x="36" y="16" fill="rgba(255,255,255,0.85)">Logo en buena calidad</text>

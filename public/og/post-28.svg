<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg28" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g28a" cx="0.3" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g28b" cx="0.8" cy="0.75" r="0.55">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg28)"/>
  <rect width="800" height="500" fill="url(#g28a)"/>
  <rect width="800" height="500" fill="url(#g28b)"/>

  <!-- Phone with Bizum payment -->
  <g transform="translate(180,70)">
    <rect x="0" y="0" width="190" height="360" rx="28" fill="rgba(7,5,14,0.9)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <rect x="70" y="14" width="50" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
    <!-- bizum brand block -->
    <g transform="translate(25,50)">
      <rect x="0" y="0" width="140" height="44" rx="10" fill="rgba(59,130,246,0.25)" stroke="rgba(59,130,246,0.6)"/>
      <text x="70" y="28" text-anchor="middle" font-family="Inter,system-ui" font-size="17" font-weight="800" fill="#fff" letter-spacing="1">bizum</text>
    </g>
    <!-- amount -->
    <text x="95" y="155" text-anchor="middle" font-family="Inter,system-ui" font-size="30" font-weight="800" fill="#fff">38,50€</text>
    <text x="95" y="178" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.5)">TIENDA ONLINE · PEDIDO 2417</text>
    <!-- phone number field -->
    <rect x="25" y="200" width="140" height="34" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <text x="95" y="222" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.7)">+34 6•• •• •• ••</text>
    <!-- pay button -->
    <rect x="25" y="250" width="140" height="40" rx="20" fill="rgba(59,130,246,0.85)"/>
    <text x="95" y="275" text-anchor="middle" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="#fff">Pagar con Bizum</text>
    <text x="95" y="320" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="rgba(34,197,94,0.85)">confirmado en 2 toques</text>
  </g>

  <!-- Right: stats panel -->
  <g transform="translate(440,120)">
    <text x="0" y="0" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="#3B82F6" letter-spacing="3">BIZUM EN TU TIENDA</text>
    <rect x="0" y="20" width="280" height="120" rx="14" fill="rgba(7,5,14,0.8)" stroke="rgba(59,130,246,0.4)"/>
    <text x="20" y="62" font-family="Inter,system-ui" font-size="26" font-weight="800" fill="#fff">28M+</text>
    <text x="20" y="84" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.6)">usuarios en España</text>
    <text x="20" y="118" font-family="ui-monospace,monospace" font-size="11" fill="rgba(34,197,94,0.85)">+ conversión en tickets &lt; 50€</text>

    <rect x="0" y="160" width="280" height="100" rx="14" fill="rgba(7,5,14,0.8)" stroke="rgba(255,255,255,0.12)"/>
    <g transform="translate(20,185)">
      <rect x="0" y="0" width="70" height="24" rx="12" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.5)"/>
      <text x="35" y="16" text-anchor="middle" font-family="Inter,system-ui" font-size="10" font-weight="700" fill="#60A5FA">Bizum</text>
      <rect x="80" y="0" width="70" height="24" rx="12" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.5)"/>
      <text x="115" y="16" text-anchor="middle" font-family="Inter,system-ui" font-size="10" font-weight="700" fill="#A78BFA">Tarjeta</text>
      <rect x="160" y="0" width="100" height="24" rx="12" fill="rgba(251,191,36,0.18)" stroke="rgba(251,191,36,0.5)"/>
      <text x="210" y="16" text-anchor="middle" font-family="Inter,system-ui" font-size="10" font-weight="700" fill="#FBBF24">Transferencia</text>
    </g>
    <text x="20" y="245" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.5)">incluidos de serie en Latech</text>
  </g>
</svg>

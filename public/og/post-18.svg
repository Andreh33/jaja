<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg18" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g18a" cx="0.3" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g18b" cx="0.8" cy="0.75" r="0.5">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg18)"/>
  <rect width="800" height="500" fill="url(#g18a)"/>
  <rect width="800" height="500" fill="url(#g18b)"/>

  <!-- Appointment calendar mockup -->
  <g transform="translate(130,90)" opacity="0.9">
    <rect x="0" y="0" width="320" height="300" rx="14" fill="rgba(7,5,14,0.88)" stroke="rgba(255,255,255,0.16)" stroke-width="1.5"/>
    <rect x="0" y="0" width="320" height="44" rx="14" fill="rgba(59,130,246,0.15)"/>
    <text x="20" y="28" font-family="ui-monospace,monospace" font-size="12" fill="#3B82F6" font-weight="bold">CITA ONLINE</text>
    <!-- calendar grid -->
    <g fill="rgba(255,255,255,0.08)">
      <rect x="22" y="64" width="56" height="40" rx="8"/>
      <rect x="90" y="64" width="56" height="40" rx="8"/>
      <rect x="158" y="64" width="56" height="40" rx="8"/>
      <rect x="226" y="64" width="56" height="40" rx="8"/>
      <rect x="22" y="116" width="56" height="40" rx="8"/>
      <rect x="158" y="116" width="56" height="40" rx="8"/>
      <rect x="226" y="116" width="56" height="40" rx="8"/>
    </g>
    <rect x="90" y="116" width="56" height="40" rx="8" fill="rgba(59,130,246,0.7)"/>
    <text x="118" y="141" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" fill="#FFFFFF" font-weight="bold">10:30</text>
    <!-- confirm button -->
    <rect x="22" y="180" width="260" height="40" rx="10" fill="rgba(59,130,246,0.85)"/>
    <text x="152" y="205" text-anchor="middle" font-family="Inter,system-ui" font-size="14" font-weight="700" fill="#07050E">Confirmar cita</text>
    <text x="22" y="250" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.5)">recordatorio 24h antes</text>
    <text x="22" y="272" font-family="ui-monospace,monospace" font-size="11" fill="rgba(34,197,94,0.8)">-50% no-shows</text>
  </g>

  <!-- Medical cross + shield (RGPD) -->
  <g transform="translate(560,160)" opacity="0.9">
    <circle cx="0" cy="0" r="56" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.5)" stroke-width="1.5"/>
    <rect x="-12" y="-34" width="24" height="68" rx="6" fill="#3B82F6" opacity="0.9"/>
    <rect x="-34" y="-12" width="68" height="24" rx="6" fill="#3B82F6" opacity="0.9"/>
  </g>
  <g transform="translate(560,320)" opacity="0.88">
    <path d="M0 -36 C14 -28 28 -24 36 -24 C36 6 22 30 0 40 C-22 30 -36 6 -36 -24 C-28 -24 -14 -28 0 -36 Z" fill="rgba(139,92,246,0.18)" stroke="#8B5CF6" stroke-width="2"/>
    <path d="M-12 0 l8 9 l16 -18" fill="none" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="72" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.55)">RGPD · datos de salud</text>
  </g>

  <circle cx="120" cy="430" r="60" fill="#3B82F6" opacity="0.15"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg59" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g59a" cx="0.2" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g59b" cx="0.8" cy="0.65" r="0.55">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg59)"/>
  <rect width="800" height="500" fill="url(#g59a)"/>
  <rect width="800" height="500" fill="url(#g59b)"/>

  <!-- VS divider -->
  <g transform="translate(400,250)">
    <circle r="34" fill="rgba(7,5,14,0.95)" stroke="rgba(139,92,246,0.6)" stroke-width="2"/>
    <text x="0" y="7" text-anchor="middle" font-family="Inter,system-ui" font-size="20" font-weight="800" fill="#fff">VS</text>
  </g>

  <!-- Left: Landing panel -->
  <g transform="translate(80,110)">
    <rect width="270" height="280" rx="16" fill="rgba(7,5,14,0.85)" stroke="rgba(139,92,246,0.45)"/>
    <text x="24" y="42" font-family="Inter,system-ui" font-size="18" font-weight="800" fill="#fff">Landing page</text>
    <text x="24" y="64" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="2">UNA PÁGINA · 1 OBJETIVO</text>

    <g font-family="ui-monospace,monospace" font-size="11">
      <text x="24" y="104" fill="rgba(255,255,255,0.75)">Foco en conversión</text>
      <rect x="24" y="114" width="222" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>
      <rect x="24" y="114" width="205" height="10" rx="5" fill="rgba(139,92,246,0.85)"/>
      <text x="24" y="148" fill="rgba(255,255,255,0.55)">máximo</text>

      <text x="24" y="190" fill="rgba(255,255,255,0.7)">→ Campañas y ads</text>
      <text x="24" y="216" fill="rgba(255,255,255,0.7)">→ 1 acción clara</text>
      <text x="24" y="242" fill="rgba(255,255,255,0.7)">→ Lanzamientos</text>
    </g>
  </g>

  <!-- Right: Web corporativa panel -->
  <g transform="translate(450,110)">
    <rect width="270" height="280" rx="16" fill="rgba(7,5,14,0.85)" stroke="rgba(59,130,246,0.55)"/>
    <text x="24" y="42" font-family="Inter,system-ui" font-size="18" font-weight="800" fill="#fff">Web corporativa</text>
    <text x="24" y="64" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="2">VARIAS PÁGINAS · MARCA</text>

    <g font-family="ui-monospace,monospace" font-size="11">
      <text x="24" y="104" fill="rgba(255,255,255,0.75)">Alcance SEO</text>
      <rect x="24" y="114" width="222" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>
      <rect x="24" y="114" width="213" height="10" rx="5" fill="rgba(59,130,246,0.85)"/>
      <text x="24" y="148" fill="rgba(255,255,255,0.55)">amplio</text>

      <text x="24" y="190" fill="rgba(255,255,255,0.7)">→ Servicios y blog</text>
      <text x="24" y="216" fill="rgba(255,255,255,0.7)">→ Autoridad de marca</text>
      <text x="24" y="242" fill="rgba(255,255,255,0.7)">→ Crece contigo</text>
    </g>
  </g>

  <text x="400" y="78" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.55)" letter-spacing="4">LANDING O WEB CORPORATIVA</text>

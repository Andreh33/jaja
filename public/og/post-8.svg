<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04231A"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g8a" cx="0.25" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#25D366" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#25D366" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g8b" cx="0.8" cy="0.75" r="0.55">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg8)"/>
  <rect width="800" height="500" fill="url(#g8a)"/>
  <rect width="800" height="500" fill="url(#g8b)"/>

  <!-- Phone frame -->
  <g transform="translate(120,80)" opacity="0.95">
    <rect x="0" y="0" width="240" height="340" rx="32" fill="rgba(7,5,14,0.92)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <rect x="14" y="14" width="212" height="312" rx="22" fill="rgba(4,35,26,0.85)"/>

    <!-- header -->
    <rect x="14" y="14" width="212" height="44" rx="22" fill="rgba(37,211,102,0.18)"/>
    <circle cx="40" cy="36" r="14" fill="rgba(37,211,102,0.5)"/>
    <text x="62" y="34" font-family="Inter,system-ui" font-size="11" font-weight="700" fill="#fff">Latech · Soporte</text>
    <text x="62" y="48" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.55)">en línea · respuesta 24/7</text>

    <!-- messages -->
    <g font-family="Inter,system-ui" font-size="10">
      <g transform="translate(28,80)">
        <rect width="140" height="32" rx="14" fill="rgba(255,255,255,0.08)"/>
        <text x="14" y="19" fill="rgba(255,255,255,0.85)">Hola, ¿abrís hoy?</text>
      </g>
      <g transform="translate(72,124)">
        <rect width="140" height="46" rx="14" fill="rgba(37,211,102,0.25)"/>
        <text x="14" y="20" fill="#fff">Sí, hasta las 22:00.</text>
        <text x="14" y="36" fill="rgba(255,255,255,0.7)">¿Reservo mesa?</text>
      </g>
      <g transform="translate(28,184)">
        <rect width="140" height="32" rx="14" fill="rgba(255,255,255,0.08)"/>
        <text x="14" y="19" fill="rgba(255,255,255,0.85)">2 personas, 21:00</text>
      </g>
      <g transform="translate(72,228)">
        <rect width="140" height="46" rx="14" fill="rgba(37,211,102,0.25)"/>
        <text x="14" y="20" fill="#fff">✅ Confirmado</text>
        <text x="14" y="36" fill="rgba(255,255,255,0.7)">Te envío el ticket</text>
      </g>
    </g>

    <!-- input bar -->
    <rect x="20" y="290" width="200" height="28" rx="14" fill="rgba(255,255,255,0.06)"/>
    <circle cx="206" cy="304" r="8" fill="rgba(37,211,102,0.6)"/>
  </g>

  <!-- right side: API badges -->
  <g transform="translate(440,110)">
    <rect width="260" height="280" rx="18" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.14)"/>
    <text x="24" y="40" font-family="Inter,system-ui" font-size="12" font-weight="700" fill="rgba(255,255,255,0.55)" letter-spacing="3">WHATSAPP CLOUD API</text>
    <text x="24" y="74" font-family="Inter,system-ui" font-size="22" font-weight="800" fill="#fff" letter-spacing="-1">Atención 24/7</text>

    <g font-family="ui-monospace,monospace" font-size="11">
      <g transform="translate(24,108)">
        <rect width="212" height="34" rx="8" fill="rgba(37,211,102,0.12)" stroke="rgba(37,211,102,0.5)"/>
        <text x="14" y="22" fill="rgba(255,255,255,0.85)">✅ Plantillas aprobadas</text>
      </g>
      <g transform="translate(24,150)">
        <rect width="212" height="34" rx="8" fill="rgba(37,211,102,0.12)" stroke="rgba(37,211,102,0.5)"/>
        <text x="14" y="22" fill="rgba(255,255,255,0.85)">✅ Respuesta &lt; 5 seg</text>
      </g>
      <g transform="translate(24,192)">
        <rect width="212" height="34" rx="8" fill="rgba(37,211,102,0.12)" stroke="rgba(37,211,102,0.5)"/>
        <text x="14" y="22" fill="rgba(255,255,255,0.85)">✅ Conectado a n8n</text>
      </g>
      <g transform="translate(24,234)">
        <rect width="212" height="34" rx="8" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.5)"/>
        <text x="14" y="22" fill="rgba(255,255,255,0.7)">❌ Spam = baneo</text>
      </g>
    </g>
  </g>
</svg>

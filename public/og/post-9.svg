<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1530"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g9a" cx="0.3" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g9b" cx="0.85" cy="0.75" r="0.55">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="speedo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg9)"/>
  <rect width="800" height="500" fill="url(#g9a)"/>
  <rect width="800" height="500" fill="url(#g9b)"/>

  <!-- PageSpeed gauge -->
  <g transform="translate(220,250)">
    <circle r="130" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.14)" stroke-width="1.5"/>
    <!-- arc background -->
    <path d="M -110 30 A 115 115 0 1 1 110 30" stroke="rgba(255,255,255,0.08)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- arc filled (high score) -->
    <path d="M -110 30 A 115 115 0 1 1 95 -65" stroke="url(#speedo)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- needle -->
    <line x1="0" y1="0" x2="80" y2="-50" stroke="#22C55E" stroke-width="3" stroke-linecap="round"/>
    <circle r="8" fill="#22C55E"/>

    <text y="60" text-anchor="middle" font-family="Inter,system-ui" font-size="42" font-weight="800" fill="#fff" letter-spacing="-2">98</text>
    <text y="84" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.55)" letter-spacing="2">PERFORMANCE</text>
  </g>

  <!-- Right metrics card -->
  <g transform="translate(440,130)">
    <rect width="280" height="240" rx="18" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.14)"/>
    <text x="24" y="40" font-family="Inter,system-ui" font-size="12" font-weight="700" fill="rgba(255,255,255,0.55)" letter-spacing="3">CORE WEB VITALS</text>

    <g font-family="ui-monospace,monospace">
      <g transform="translate(24,68)">
        <text font-size="11" fill="rgba(255,255,255,0.55)">LCP</text>
        <text x="200" font-size="14" font-weight="700" fill="#22C55E">1.4s</text>
        <rect y="14" width="232" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
        <rect y="14" width="190" height="6" rx="3" fill="#22C55E"/>
      </g>
      <g transform="translate(24,118)">
        <text font-size="11" fill="rgba(255,255,255,0.55)">INP</text>
        <text x="200" font-size="14" font-weight="700" fill="#22C55E">120ms</text>
        <rect y="14" width="232" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
        <rect y="14" width="200" height="6" rx="3" fill="#22C55E"/>
      </g>
      <g transform="translate(24,168)">
        <text font-size="11" fill="rgba(255,255,255,0.55)">CLS</text>
        <text x="200" font-size="14" font-weight="700" fill="#22C55E">0.02</text>
        <rect y="14" width="232" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
        <rect y="14" width="220" height="6" rx="3" fill="#22C55E"/>
      </g>
    </g>

    <g transform="translate(24,210)">
      <rect width="232" height="22" rx="11" fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.5)"/>
      <text x="116" y="15" text-anchor="middle" font-family="Inter,system-ui" font-size="10" font-weight="700" fill="#22C55E">+27% conversión</text>
    </g>
  </g>
</svg>

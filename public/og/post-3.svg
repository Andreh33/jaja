<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1A14"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g3a" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3b" cx="0.15" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)"/>
  <rect width="800" height="500" fill="url(#g3b)"/>
  <rect width="800" height="500" fill="url(#g3a)"/>

  <!-- Audio waves around central node -->
  <g transform="translate(400,250)" opacity="0.85">
    <!-- Concentric pulse rings -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="rgba(16,185,129,0.5)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="rgba(16,185,129,0.3)" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="rgba(16,185,129,0.18)" stroke-width="1"/>

    <!-- Radial waveform bars -->
    <g>
      <line x1="0" y1="-50" x2="0" y2="-95" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="50" x2="0" y2="95" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
      <line x1="-50" y1="0" x2="-95" y2="0" stroke="#10B981" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
      <line x1="50" y1="0" x2="95" y2="0" stroke="#10B981" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

      <line x1="-35" y1="-35" x2="-66" y2="-66" stroke="#10B981" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
      <line x1="35" y1="-35" x2="66" y2="-66" stroke="#10B981" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
      <line x1="-35" y1="35" x2="-66" y2="66" stroke="#10B981" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
      <line x1="35" y1="35" x2="66" y2="66" stroke="#10B981" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    </g>

    <!-- Central node = AI -->
    <circle cx="0" cy="0" r="44" fill="rgba(7,5,14,0.92)" stroke="rgba(16,185,129,0.85)" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-family="Inter,system-ui" font-size="16" font-weight="800" fill="#10B981" letter-spacing="2">IA</text>
  </g>

  <!-- Connected nodes (n8n style) -->
  <g opacity="0.82">
    <line x1="180" y1="120" x2="350" y2="220" stroke="rgba(16,185,129,0.4)" stroke-width="1.2" stroke-dasharray="4 4"/>
    <line x1="640" y1="100" x2="450" y2="220" stroke="rgba(16,185,129,0.4)" stroke-width="1.2" stroke-dasharray="4 4"/>
    <line x1="160" y1="380" x2="350" y2="280" stroke="rgba(16,185,129,0.4)" stroke-width="1.2" stroke-dasharray="4 4"/>
    <line x1="660" y1="400" x2="460" y2="280" stroke="rgba(16,185,129,0.4)" stroke-width="1.2" stroke-dasharray="4 4"/>

    <g transform="translate(180,120)">
      <rect x="-44" y="-22" width="88" height="44" rx="10" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.18)"/>
      <text x="0" y="4" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.85)">📞 voz</text>
    </g>
    <g transform="translate(640,100)">
      <rect x="-46" y="-22" width="92" height="44" rx="10" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.18)"/>
      <text x="0" y="4" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.85)">💬 WhatsApp</text>
    </g>
    <g transform="translate(160,380)">
      <rect x="-44" y="-22" width="88" height="44" rx="10" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.18)"/>
      <text x="0" y="4" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.85)">💳 Stripe</text>
    </g>
    <g transform="translate(660,400)">
      <rect x="-44" y="-22" width="88" height="44" rx="10" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.18)"/>
      <text x="0" y="4" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.85)">🗂 CRM</text>
    </g>
  </g>
</svg>

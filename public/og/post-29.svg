<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg29" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g29a" cx="0.2" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g29b" cx="0.85" cy="0.7" r="0.55">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg29)"/>
  <rect width="800" height="500" fill="url(#g29a)"/>
  <rect width="800" height="500" fill="url(#g29b)"/>

  <!-- Left: DM chat (selling by message) -->
  <g transform="translate(80,120)" opacity="0.85">
    <text x="0" y="0" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="3">VENDER POR DM</text>
    <rect x="0" y="20" width="270" height="220" rx="14" fill="rgba(7,5,14,0.7)" stroke="rgba(255,255,255,0.12)"/>
    <!-- chat bubbles -->
    <g transform="translate(18,42)">
      <rect x="0" y="0" width="130" height="28" rx="14" fill="rgba(255,255,255,0.1)"/>
      <text x="14" y="18" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.65)">¿precio? 23:47</text>
      <rect x="104" y="38" width="130" height="28" rx="14" fill="rgba(249,115,22,0.25)"/>
      <text x="118" y="56" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.65)">¿hay talla M?</text>
      <rect x="0" y="76" width="160" height="28" rx="14" fill="rgba(255,255,255,0.1)"/>
      <text x="14" y="94" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.65)">¿envíos a Galicia?</text>
      <rect x="104" y="114" width="130" height="28" rx="14" fill="rgba(249,115,22,0.25)"/>
      <text x="118" y="132" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.65)">te hago bizum</text>
      <rect x="0" y="152" width="120" height="28" rx="14" fill="rgba(239,68,68,0.18)" stroke="rgba(239,68,68,0.45)"/>
      <text x="14" y="170" font-family="ui-monospace,monospace" font-size="10" fill="rgba(239,68,68,0.9)">sin responder…</text>
    </g>
    <text x="18" y="268" font-family="ui-monospace,monospace" font-size="11" fill="rgba(239,68,68,0.85)">tu horario = tu techo</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(385,230)">
    <path d="M0 0 L36 0 M24 -11 L37 0 L24 11" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Right: own store selling 24/7 -->
  <g transform="translate(450,120)" opacity="0.95">
    <text x="0" y="0" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="#8B5CF6" letter-spacing="3">TIENDA PROPIA</text>
    <rect x="0" y="20" width="270" height="220" rx="14" fill="rgba(7,5,14,0.85)" stroke="rgba(139,92,246,0.45)"/>
    <!-- storefront -->
    <g transform="translate(20,42)">
      <rect x="0" y="0" width="110" height="80" rx="8" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.5)"/>
      <circle cx="30" cy="28" r="14" fill="rgba(255,255,255,0.8)"/>
      <rect x="12" y="50" width="86" height="7" rx="3" fill="rgba(255,255,255,0.7)"/>
      <rect x="12" y="63" width="56" height="5" rx="2" fill="rgba(255,255,255,0.35)"/>
      <rect x="120" y="0" width="110" height="80" rx="8" fill="rgba(139,92,246,0.14)" stroke="rgba(139,92,246,0.35)"/>
      <circle cx="150" cy="28" r="14" fill="rgba(255,255,255,0.6)"/>
      <rect x="132" y="50" width="86" height="7" rx="3" fill="rgba(255,255,255,0.55)"/>
      <rect x="132" y="63" width="56" height="5" rx="2" fill="rgba(255,255,255,0.3)"/>
    </g>
    <!-- order notification -->
    <g transform="translate(20,140)">
      <rect x="0" y="0" width="230" height="34" rx="10" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.5)"/>
      <circle cx="18" cy="17" r="8" fill="rgba(34,197,94,0.7)"/>
      <path d="M14 17 L17 20 L23 13" stroke="#07050E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="34" y="21" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.75)">pedido pagado · 03:12 AM</text>
    </g>
    <text x="20" y="268" font-family="ui-monospace,monospace" font-size="11" fill="rgba(34,197,94,0.85)">vende 24/7 · pagos automáticos</text>
  </g>
</svg>

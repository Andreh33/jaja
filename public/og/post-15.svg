  <text x="400" y="450" text-anchor="middle" font-family="Inter,system-ui" font-size="11" font-weight="700" fill="rgba(255,255,255,0.45)" letter-spacing="4">CLÍNICAS · DESPACHOS · CONSULTAS</text>

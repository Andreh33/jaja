      <stop offset="0%" stop-color="#04181F"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g15a" cx="0.25" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g15b" cx="0.85" cy="0.75" r="0.55">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg27" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g27a" cx="0.2" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g27b" cx="0.85" cy="0.65" r="0.55">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg27)"/>
  <rect width="800" height="500" fill="url(#g27a)"/>
  <rect width="800" height="500" fill="url(#g27b)"/>

  <!-- Left: WooCommerce (plugin stack) -->
  <g transform="translate(80,140)" opacity="0.85">
    <text x="0" y="0" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="3">WOOCOMMERCE</text>
    <rect x="0" y="20" width="280" height="180" rx="14" fill="rgba(7,5,14,0.7)" stroke="rgba(255,255,255,0.12)"/>
    <!-- plugin stack -->
    <g transform="translate(20,40)">
      <rect x="0" y="0" width="240" height="24" rx="6" fill="rgba(249,115,22,0.22)"/>
      <text x="10" y="16" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.6)">plugin: pagos</text>
      <rect x="0" y="30" width="240" height="24" rx="6" fill="rgba(249,115,22,0.16)"/>
      <text x="10" y="46" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.6)">plugin: seguridad</text>
      <rect x="0" y="60" width="240" height="24" rx="6" fill="rgba(249,115,22,0.22)"/>
      <text x="10" y="76" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.6)">plugin: caché</text>
      <rect x="0" y="90" width="240" height="24" rx="6" fill="rgba(249,115,22,0.16)"/>
      <text x="10" y="106" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.6)">plugin: SEO</text>
      <rect x="0" y="120" width="240" height="24" rx="6" fill="rgba(239,68,68,0.2)" stroke="rgba(239,68,68,0.5)"/>
      <text x="10" y="136" font-family="ui-monospace,monospace" font-size="10" fill="rgba(239,68,68,0.9)">23 actualizaciones pendientes</text>
    </g>
    <text x="20" y="225" font-family="ui-monospace,monospace" font-size="11" fill="rgba(239,68,68,0.85)">mantenimiento constante</text>
  </g>

  <!-- VS divider -->
  <g transform="translate(395,235)">
    <circle cx="0" cy="0" r="32" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.2)"/>
    <text x="0" y="6" text-anchor="middle" font-family="Inter,system-ui" font-size="16" font-weight="800" fill="rgba(255,255,255,0.85)" letter-spacing="2">VS</text>
  </g>

  <!-- Right: A medida (clean & fast) -->
  <g transform="translate(450,140)" opacity="0.95">
    <text x="0" y="0" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="#3B82F6" letter-spacing="3">A MEDIDA</text>
    <rect x="0" y="20" width="280" height="180" rx="14" fill="rgba(7,5,14,0.85)" stroke="rgba(59,130,246,0.45)"/>
    <!-- speed gauge -->
    <g transform="translate(70,55)">
      <circle cx="70" cy="55" r="48" fill="rgba(59,130,246,0.12)" stroke="rgba(34,197,94,0.7)" stroke-width="4"/>
      <text x="70" y="58" text-anchor="middle" font-family="Inter,system-ui" font-size="26" font-weight="800" fill="#fff">98</text>
      <text x="70" y="78" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.55)">PageSpeed</text>
    </g>
    <g transform="translate(20,160)">
      <rect x="0" y="0" width="100" height="22" rx="11" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.5)"/>
      <text x="50" y="15" text-anchor="middle" font-family="Inter,system-ui" font-size="10" font-weight="700" fill="#22C55E">0 plugins</text>
    </g>
    <text x="20" y="225" font-family="ui-monospace,monospace" font-size="11" fill="rgba(34,197,94,0.85)">+ rápida · + segura · sin parches</text>
  </g>
</svg>

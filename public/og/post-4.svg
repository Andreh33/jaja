<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#150B2A"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g4a" cx="0.7" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#A578FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#A578FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g4b" cx="0.2" cy="0.75" r="0.55">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg4)"/>
  <rect width="800" height="500" fill="url(#g4a)"/>
  <rect width="800" height="500" fill="url(#g4b)"/>

  <!-- Map / Badajoz pin -->
  <g transform="translate(160,140)" opacity="0.85">
    <rect x="0" y="0" width="320" height="220" rx="14" fill="rgba(7,5,14,0.7)" stroke="rgba(255,255,255,0.12)"/>
    <!-- street grid pattern -->
    <g opacity="0.45" stroke="rgba(165,120,255,0.35)" stroke-width="1" fill="none">
      <line x1="0" y1="50" x2="320" y2="50"/>
      <line x1="0" y1="100" x2="320" y2="100"/>
      <line x1="0" y1="150" x2="320" y2="150"/>
      <line x1="60" y1="0" x2="60" y2="220"/>
      <line x1="140" y1="0" x2="140" y2="220"/>
      <line x1="230" y1="0" x2="230" y2="220"/>
    </g>

    <!-- Badajoz pin -->
    <g transform="translate(160,110)">
      <circle cx="0" cy="0" r="38" fill="rgba(165,120,255,0.18)"/>
      <circle cx="0" cy="0" r="22" fill="rgba(165,120,255,0.35)"/>
      <circle cx="0" cy="0" r="10" fill="#A578FF"/>
      <circle cx="0" cy="0" r="4" fill="#fff"/>
    </g>

    <text x="160" y="195" text-anchor="middle" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="2">BADAJOZ</text>
  </g>

  <!-- Search ranking widget -->
  <g transform="translate(520,140)" opacity="0.95">
    <rect x="0" y="0" width="220" height="220" rx="14" fill="rgba(7,5,14,0.85)" stroke="rgba(165,120,255,0.4)"/>

    <!-- Search input -->
    <rect x="20" y="20" width="180" height="32" rx="16" fill="rgba(255,255,255,0.06)"/>
    <circle cx="36" cy="36" r="6" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <line x1="42" y1="42" x2="48" y2="48" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <text x="52" y="40" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.5)">peluquería badajoz</text>

    <!-- ranking 1 -->
    <g transform="translate(20,75)">
      <rect x="0" y="0" width="180" height="36" rx="8" fill="rgba(165,120,255,0.18)" stroke="rgba(165,120,255,0.5)"/>
      <text x="10" y="14" font-family="Inter,system-ui" font-size="9" font-weight="700" fill="#A578FF">#1</text>
      <text x="28" y="14" font-family="Inter,system-ui" font-size="10" font-weight="600" fill="#fff">Tu negocio</text>
      <text x="10" y="28" font-family="ui-monospace,monospace" font-size="8" fill="rgba(255,255,255,0.55)">★ 4.9 · 87 reviews</text>
    </g>
    <!-- ranking 2 -->
    <g transform="translate(20,118)">
      <rect x="0" y="0" width="180" height="32" rx="8" fill="rgba(255,255,255,0.04)"/>
      <text x="10" y="14" font-family="Inter,system-ui" font-size="9" font-weight="700" fill="rgba(255,255,255,0.5)">#2</text>
      <text x="28" y="14" font-family="Inter,system-ui" font-size="10" fill="rgba(255,255,255,0.6)">Competidor A</text>
    </g>
    <!-- ranking 3 -->
    <g transform="translate(20,156)">
      <rect x="0" y="0" width="180" height="32" rx="8" fill="rgba(255,255,255,0.04)"/>
      <text x="10" y="14" font-family="Inter,system-ui" font-size="9" font-weight="700" fill="rgba(255,255,255,0.5)">#3</text>
      <text x="28" y="14" font-family="Inter,system-ui" font-size="10" fill="rgba(255,255,255,0.6)">Competidor B</text>
    </g>
  </g>
</svg>

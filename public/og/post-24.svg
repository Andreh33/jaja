<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg24" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g24a" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g24b" cx="0.2" cy="0.75" r="0.55">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg24)"/>
  <rect width="800" height="500" fill="url(#g24a)"/>
  <rect width="800" height="500" fill="url(#g24b)"/>

  <!-- Graduation cap flat -->
  <g transform="translate(240,150)" opacity="0.92">
    <path d="M0 -44 L110 0 L0 44 L-110 0 Z" fill="rgba(251,191,36,0.25)" stroke="#FBBF24" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M-60 22 L-60 56 C-60 70 60 70 60 56 L60 22" fill="none" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="110" y1="0" x2="110" y2="60" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="110" cy="66" r="6" fill="#FBBF24"/>
  </g>

  <!-- Course catalog mockup -->
  <g transform="translate(120,270)" opacity="0.9">
    <rect x="0" y="0" width="300" height="150" rx="14" fill="rgba(7,5,14,0.88)" stroke="rgba(255,255,255,0.16)" stroke-width="1.5"/>
    <text x="18" y="28" font-family="ui-monospace,monospace" font-size="11" fill="#8B5CF6" font-weight="bold">CATÁLOGO DE CURSOS</text>
    <g>
      <rect x="18" y="42" width="84" height="56" rx="8" fill="rgba(139,92,246,0.35)"/>
      <text x="60" y="74" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#FFFFFF">inglés B2</text>
      <rect x="108" y="42" width="84" height="56" rx="8" fill="rgba(59,130,246,0.35)"/>
      <text x="150" y="74" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#FFFFFF">oposiciones</text>
      <rect x="198" y="42" width="84" height="56" rx="8" fill="rgba(249,115,22,0.35)"/>
      <text x="240" y="74" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#FFFFFF">online</text>
    </g>
    <text x="18" y="128" font-family="ui-monospace,monospace" font-size="10" fill="rgba(34,197,94,0.85)">87% aprobados a la primera</text>
  </g>

  <!-- Enrollment + payment card -->
  <g transform="translate(470,120)" opacity="0.9">
    <rect x="0" y="0" width="230" height="200" rx="14" fill="rgba(7,5,14,0.88)" stroke="rgba(255,255,255,0.16)" stroke-width="1.5"/>
    <text x="16" y="28" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.6)">matrícula online</text>
    <rect x="16" y="40" width="198" height="18" rx="6" fill="rgba(255,255,255,0.08)"/>
    <rect x="16" y="64" width="198" height="18" rx="6" fill="rgba(255,255,255,0.08)"/>
    <!-- payment row -->
    <rect x="16" y="94" width="96" height="30" rx="8" fill="rgba(139,92,246,0.3)" stroke="rgba(139,92,246,0.7)" stroke-width="1.5"/>
    <text x="64" y="113" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#8B5CF6">tarjeta</text>
    <rect x="120" y="94" width="94" height="30" rx="8" fill="rgba(59,130,246,0.3)" stroke="rgba(59,130,246,0.7)" stroke-width="1.5"/>
    <text x="167" y="113" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#3B82F6">Bizum</text>
    <rect x="16" y="138" width="150" height="32" rx="9" fill="rgba(251,191,36,0.9)"/>
    <text x="91" y="159" text-anchor="middle" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="#07050E">Matricularme</text>
    <text x="16" y="190" font-family="ui-monospace,monospace" font-size="10" fill="rgba(34,197,94,0.85)">plaza confirmada ✓ 23:48h</text>
  </g>

  <!-- Students growth -->
  <g transform="translate(500,360)" opacity="0.85">
    <rect x="0" y="30" width="16" height="30" rx="3" fill="rgba(139,92,246,0.5)"/>
    <rect x="24" y="18" width="16" height="42" rx="3" fill="rgba(139,92,246,0.65)"/>
    <rect x="48" y="6" width="16" height="54" rx="3" fill="rgba(139,92,246,0.8)"/>
    <rect x="72" y="-8" width="16" height="68" rx="3" fill="#8B5CF6"/>
    <text x="110" y="40" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.55)">+alumnos</text>
  </g>

  <circle cx="680" cy="80" r="60" fill="#8B5CF6" opacity="0.18"/>
</svg>

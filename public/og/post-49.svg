<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg49" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g49a" cx="0.25" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g49b" cx="0.8" cy="0.7" r="0.55">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg49)"/>
  <rect width="800" height="500" fill="url(#g49a)"/>
  <rect width="800" height="500" fill="url(#g49b)"/>

  <!-- Price range chart card -->
  <g transform="translate(90,90)">
    <rect width="380" height="320" rx="18" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.14)"/>
    <text x="24" y="40" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.55)" letter-spacing="3">PRECIOS WEB · ESPAÑA 2026</text>

    <!-- bars -->
    <g font-family="ui-monospace,monospace" font-size="11">
      <g transform="translate(24,70)">
        <text x="0" y="12" fill="rgba(255,255,255,0.8)">Plantilla DIY</text>
        <rect x="0" y="20" width="70" height="16" rx="8" fill="rgba(59,130,246,0.6)"/>
        <text x="80" y="33" fill="rgba(255,255,255,0.55)">0-300€</text>
      </g>
      <g transform="translate(24,130)">
        <text x="0" y="12" fill="rgba(255,255,255,0.8)">Freelancer</text>
        <rect x="0" y="20" width="130" height="16" rx="8" fill="rgba(139,92,246,0.7)"/>
        <text x="140" y="33" fill="rgba(255,255,255,0.55)">300-1.500€</text>
      </g>
      <g transform="translate(24,190)">
        <text x="0" y="12" fill="rgba(255,255,255,0.8)">Agencia tradicional</text>
        <rect x="0" y="20" width="220" height="16" rx="8" fill="rgba(249,115,22,0.7)"/>
        <text x="230" y="33" fill="rgba(255,255,255,0.55)">1.500-6.000€</text>
      </g>
      <g transform="translate(24,250)">
        <text x="0" y="12" fill="rgba(255,255,255,0.8)">A medida</text>
        <rect x="0" y="20" width="300" height="16" rx="8" fill="rgba(251,191,36,0.75)"/>
        <text x="240" y="14" fill="rgba(255,255,255,0.55)">6.000€+</text>
      </g>
    </g>
  </g>

  <!-- Right: price tag card -->
  <g transform="translate(510,120)">
    <rect width="210" height="260" rx="16" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.5)"/>
    <text x="105" y="48" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.55)" letter-spacing="2">SUSCRIPCIÓN</text>
    <text x="105" y="100" text-anchor="middle" font-family="Inter,system-ui" font-size="38" font-weight="800" fill="#fff" letter-spacing="-1">60€/mes</text>
    <text x="105" y="128" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="rgba(251,191,36,0.9)">+ 600€ creación</text>

    <g font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.75)">
      <text x="28" y="168">✓ Hosting + dominio</text>
      <text x="28" y="192">✓ Cambios incluidos</text>
      <text x="28" y="216">✓ Sin permanencia</text>
    </g>
    <rect x="28" y="232" width="154" height="2" rx="1" fill="rgba(255,255,255,0.12)"/>
    <text x="105" y="252" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.5)">todo incluido</text>
  </g>
</svg>

  <rect width="800" height="500" fill="url(#bg35)"/>
  <rect width="800" height="500" fill="url(#g35a)"/>
  <rect width="800" height="500" fill="url(#g35b)"/>

  <!-- Busy hands node -->
  <g transform="translate(190,200)">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg46" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g46a" cx="0.25" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g46b" cx="0.78" cy="0.7" r="0.55">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg46)"/>
  <rect width="800" height="500" fill="url(#g46a)"/>
  <rect width="800" height="500" fill="url(#g46b)"/>

  <!-- SEO card -->
  <g transform="translate(115,100)" opacity="0.95">
    <rect x="0" y="0" width="260" height="300" rx="16" fill="rgba(7,5,14,0.85)" stroke="rgba(139,92,246,0.45)"/>
    <text x="24" y="40" font-family="ui-monospace,monospace" font-size="11" fill="#A78BFA" letter-spacing="3">SEO · ORGANICO</text>
    <text x="24" y="70" font-family="Inter,system-ui" font-size="18" font-weight="800" fill="#fff">Propiedad</text>

    <!-- rising steps -->
    <g transform="translate(24,100)">
      <rect x="0" y="110" width="36" height="30" rx="6" fill="rgba(139,92,246,0.3)"/>
      <rect x="44" y="88" width="36" height="52" rx="6" fill="rgba(139,92,246,0.45)"/>
      <rect x="88" y="60" width="36" height="80" rx="6" fill="rgba(139,92,246,0.6)"/>
      <rect x="132" y="28" width="36" height="112" rx="6" fill="rgba(139,92,246,0.75)"/>
      <rect x="176" y="0" width="36" height="140" rx="6" fill="#8B5CF6"/>
    </g>
    <text x="24" y="266" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.55)">acumulativo · sin coste/clic</text>
    <text x="24" y="284" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.4)">resultados: meses</text>
  </g>

  <!-- VS badge -->
  <g transform="translate(400,250)">
    <circle cx="0" cy="0" r="34" fill="rgba(7,5,14,0.9)" stroke="rgba(251,191,36,0.6)" stroke-width="2"/>
    <text x="0" y="7" text-anchor="middle" font-family="Inter,system-ui" font-size="18" font-weight="800" fill="#FBBF24">VS</text>
  </g>

  <!-- SEM card -->
  <g transform="translate(425,100)" opacity="0.95">
    <rect x="0" y="0" width="260" height="300" rx="16" fill="rgba(7,5,14,0.85)" stroke="rgba(249,115,22,0.45)"/>
    <text x="24" y="40" font-family="ui-monospace,monospace" font-size="11" fill="#FB923C" letter-spacing="3">SEM · ANUNCIOS</text>
    <text x="24" y="70" font-family="Inter,system-ui" font-size="18" font-weight="800" fill="#fff">Alquiler</text>

    <!-- flat then drop bars -->
    <g transform="translate(24,100)">
      <rect x="0" y="30" width="36" height="110" rx="6" fill="rgba(249,115,22,0.8)"/>
      <rect x="44" y="30" width="36" height="110" rx="6" fill="rgba(249,115,22,0.8)"/>
      <rect x="88" y="30" width="36" height="110" rx="6" fill="rgba(249,115,22,0.8)"/>
      <rect x="132" y="30" width="36" height="110" rx="6" fill="rgba(249,115,22,0.35)"/>
      <rect x="176" y="120" width="36" height="20" rx="6" fill="rgba(249,115,22,0.18)"/>
      <!-- pause icon over drop -->
      <g transform="translate(140,4)">
        <text x="0" y="12" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.5)">stop pago</text>
      </g>
    </g>
    <text x="24" y="266" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.55)">inmediato · pagas cada clic</text>
    <text x="24" y="284" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.4)">se apaga al dejar de pagar</text>
  </g>

  <text x="400" y="448" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="rgba(255,255,255,0.55)" letter-spacing="3">DONDE INVERTIR PRIMERO</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg32" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g32a" cx="0.25" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g32b" cx="0.8" cy="0.75" r="0.55">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg32)"/>
  <rect width="800" height="500" fill="url(#g32a)"/>
  <rect width="800" height="500" fill="url(#g32b)"/>

  <!-- Left: abandoned cart -->
  <g transform="translate(80,110)">
    <text x="0" y="0" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="3">CARRITO ABANDONADO</text>
    <rect x="0" y="20" width="280" height="230" rx="14" fill="rgba(7,5,14,0.75)" stroke="rgba(255,255,255,0.12)"/>
    <!-- cart icon -->
    <g transform="translate(80,60)">
      <path d="M0 0 L18 0 L30 62 L96 62 L110 18 L24 18" stroke="rgba(255,255,255,0.7)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="40" cy="84" r="8" fill="rgba(255,255,255,0.7)"/>
      <circle cx="88" cy="84" r="8" fill="rgba(255,255,255,0.7)"/>
      <!-- items inside -->
      <rect x="38" y="28" width="18" height="18" rx="3" fill="rgba(139,92,246,0.6)"/>
      <rect x="62" y="28" width="18" height="18" rx="3" fill="rgba(59,130,246,0.6)"/>
    </g>
    <!-- abandonment stat -->
    <text x="140" y="200" text-anchor="middle" font-family="Inter,system-ui" font-size="28" font-weight="800" fill="rgba(239,68,68,0.95)">70%</text>
    <text x="140" y="222" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="rgba(239,68,68,0.8)">se queda sin pagar</text>
  </g>

  <!-- Right: recovery tactics -->
  <g transform="translate(420,110)">
    <text x="0" y="0" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="#8B5CF6" letter-spacing="3">9 TÁCTICAS</text>

    <rect x="0" y="20" width="300" height="56" rx="12" fill="rgba(7,5,14,0.8)" stroke="rgba(255,255,255,0.12)"/>
    <text x="18" y="44" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.55)">01 · ENVÍO SIN SORPRESAS</text>
    <text x="18" y="63" font-family="Inter,system-ui" font-size="12" font-weight="700" fill="#fff">coste visible desde la ficha</text>

    <rect x="0" y="88" width="300" height="56" rx="12" fill="rgba(7,5,14,0.8)" stroke="rgba(255,255,255,0.12)"/>
    <text x="18" y="112" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.55)">02 · CHECKOUT CORTO + BIZUM</text>
    <text x="18" y="131" font-family="Inter,system-ui" font-size="12" font-weight="700" fill="#fff">pagar en dos toques</text>

    <rect x="0" y="156" width="300" height="56" rx="12" fill="rgba(7,5,14,0.8)" stroke="rgba(255,255,255,0.12)"/>
    <!-- mail icon -->
    <g transform="translate(18,172)">
      <rect x="0" y="0" width="26" height="18" rx="3" fill="none" stroke="rgba(34,197,94,0.8)" stroke-width="2"/>
      <path d="M1 2 L13 11 L25 2" stroke="rgba(34,197,94,0.8)" stroke-width="2" fill="none"/>
    </g>
    <text x="56" y="180" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.55)">03 · EMAIL DE RECUPERACIÓN</text>
    <text x="56" y="199" font-family="Inter,system-ui" font-size="12" font-weight="700" fill="#fff">recupera el 5-15%</text>

    <g transform="translate(0,232)">
      <rect x="0" y="0" width="200" height="28" rx="14" fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.5)"/>
      <text x="100" y="18" text-anchor="middle" font-family="Inter,system-ui" font-size="11" font-weight="700" fill="#22C55E">+ ventas, mismo tráfico</text>
    </g>
  </g>
</svg>

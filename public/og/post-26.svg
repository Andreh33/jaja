<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg26" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g26a" cx="0.2" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g26b" cx="0.85" cy="0.7" r="0.55">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg26)"/>
  <rect width="800" height="500" fill="url(#g26a)"/>
  <rect width="800" height="500" fill="url(#g26b)"/>

  <!-- Left: Shopify (template) -->
  <g transform="translate(80,140)" opacity="0.85">
    <text x="0" y="0" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="3">SHOPIFY</text>
    <rect x="0" y="20" width="280" height="180" rx="14" fill="rgba(7,5,14,0.7)" stroke="rgba(255,255,255,0.12)"/>
    <!-- generic template blocks -->
    <g transform="translate(20,40)">
      <rect x="0" y="0" width="240" height="34" rx="6" fill="rgba(59,130,246,0.2)"/>
      <rect x="0" y="44" width="115" height="60" rx="6" fill="rgba(59,130,246,0.14)"/>
      <rect x="125" y="44" width="115" height="60" rx="6" fill="rgba(59,130,246,0.14)"/>
      <rect x="0" y="114" width="240" height="22" rx="6" fill="rgba(59,130,246,0.1)"/>
    </g>
    <text x="20" y="225" font-family="ui-monospace,monospace" font-size="11" fill="rgba(239,68,68,0.85)">cuota + apps + comisiones</text>
  </g>

  <!-- VS divider -->
  <g transform="translate(395,235)">
    <circle cx="0" cy="0" r="32" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.2)"/>
    <text x="0" y="6" text-anchor="middle" font-family="Inter,system-ui" font-size="16" font-weight="800" fill="rgba(255,255,255,0.85)" letter-spacing="2">VS</text>
  </g>

  <!-- Right: A medida -->
  <g transform="translate(450,140)" opacity="0.95">
    <text x="0" y="0" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="#8B5CF6" letter-spacing="3">A MEDIDA</text>
    <rect x="0" y="20" width="280" height="180" rx="14" fill="rgba(7,5,14,0.85)" stroke="rgba(139,92,246,0.45)"/>
    <!-- custom layout -->
    <g transform="translate(20,40)">
      <rect x="0" y="0" width="150" height="100" rx="10" fill="rgba(139,92,246,0.25)" stroke="rgba(139,92,246,0.6)" stroke-width="1.5"/>
      <circle cx="35" cy="35" r="16" fill="rgba(255,255,255,0.85)"/>
      <rect x="14" y="62" width="120" height="8" rx="3" fill="rgba(255,255,255,0.8)"/>
      <rect x="14" y="78" width="80" height="6" rx="2" fill="rgba(255,255,255,0.4)"/>
      <rect x="162" y="0" width="78" height="46" rx="8" fill="rgba(139,92,246,0.16)"/>
      <rect x="162" y="54" width="78" height="46" rx="8" fill="rgba(139,92,246,0.16)"/>
    </g>
    <g transform="translate(20,160)">
      <rect x="0" y="0" width="110" height="22" rx="11" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.5)"/>
      <text x="55" y="15" text-anchor="middle" font-family="Inter,system-ui" font-size="10" font-weight="700" fill="#22C55E">código tuyo</text>
    </g>
    <text x="20" y="225" font-family="ui-monospace,monospace" font-size="11" fill="rgba(34,197,94,0.85)">+ SEO · + velocidad · 0% comisión</text>
  </g>

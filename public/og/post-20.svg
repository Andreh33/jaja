<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg20" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g20a" cx="0.3" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g20b" cx="0.8" cy="0.7" r="0.55">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg20)"/>
  <rect width="800" height="500" fill="url(#g20a)"/>
  <rect width="800" height="500" fill="url(#g20b)"/>

  <!-- Scales of justice, flat -->
  <g transform="translate(250,230)" opacity="0.92" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="0" y1="-110" x2="0" y2="90"/>
    <line x1="-90" y1="-80" x2="90" y2="-80"/>
    <circle cx="0" cy="-120" r="10" fill="rgba(251,191,36,0.25)"/>
    <!-- left pan -->
    <line x1="-90" y1="-80" x2="-115" y2="-20"/>
    <line x1="-90" y1="-80" x2="-65" y2="-20"/>
    <path d="M-115 -20 A 25 25 0 0 0 -65 -20" fill="rgba(251,191,36,0.18)"/>
    <!-- right pan -->
    <line x1="90" y1="-80" x2="65" y2="-20"/>
    <line x1="90" y1="-80" x2="115" y2="-20"/>
    <path d="M65 -20 A 25 25 0 0 0 115 -20" fill="rgba(251,191,36,0.18)"/>
    <!-- base -->
    <line x1="-50" y1="90" x2="50" y2="90"/>
  </g>

  <!-- Article / content card that ranks -->
  <g transform="translate(450,100)" opacity="0.9">
    <rect x="0" y="0" width="240" height="180" rx="14" fill="rgba(7,5,14,0.88)" stroke="rgba(255,255,255,0.16)" stroke-width="1.5"/>
    <text x="18" y="30" font-family="ui-monospace,monospace" font-size="11" fill="#3B82F6" font-weight="bold">BLOG · autoridad</text>
    <rect x="18" y="44" width="180" height="11" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="18" y="64" width="204" height="8" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="18" y="80" width="190" height="8" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="18" y="96" width="160" height="8" rx="3" fill="rgba(255,255,255,0.1)"/>
    <!-- ranking arrow -->
    <path d="M18 150 L70 132 L110 140 L160 116 L210 102" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M198 100 l12 2 l-4 11" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round"/>
    <text x="18" y="168" font-family="ui-monospace,monospace" font-size="10" fill="rgba(34,197,94,0.85)">posición #1 Google</text>
  </g>

  <!-- Contact form card -->
  <g transform="translate(470,310)" opacity="0.9">
    <rect x="0" y="0" width="220" height="120" rx="12" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <text x="16" y="26" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.55)">consulta tu caso</text>
    <rect x="16" y="36" width="188" height="16" rx="5" fill="rgba(255,255,255,0.08)"/>
    <rect x="16" y="58" width="188" height="16" rx="5" fill="rgba(255,255,255,0.08)"/>
    <rect x="16" y="82" width="110" height="24" rx="7" fill="rgba(59,130,246,0.85)"/>
    <text x="71" y="98" text-anchor="middle" font-family="Inter,system-ui" font-size="11" font-weight="700" fill="#07050E">Enviar consulta</text>
    <text x="140" y="99" font-family="ui-monospace,monospace" font-size="10" fill="rgba(251,191,36,0.8)">&lt; 24h</text>
  </g>

  <text x="180" y="420" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.5)">confianza + contenido = clientes</text>
  <circle cx="120" cy="90" r="60" fill="#FBBF24" opacity="0.12"/>
</svg>

        <line x1="6" y1="6" x2="16" y2="16" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
        <line x1="16" y1="6" x2="6" y2="16" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
        <text x="32" y="16" fill="rgba(255,255,255,0.55)" text-decoration="line-through">Tarifas ocultas por hora</text>

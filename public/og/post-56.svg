<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg56" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g56a" cx="0.3" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g56b" cx="0.8" cy="0.7" r="0.55">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg56)"/>
  <rect width="800" height="500" fill="url(#g56a)"/>
  <rect width="800" height="500" fill="url(#g56b)"/>

  <!-- Video call window -->
  <g transform="translate(90,95)">
    <rect width="400" height="310" rx="18" fill="rgba(7,5,14,0.9)" stroke="rgba(255,255,255,0.16)"/>
    <rect x="0" y="0" width="400" height="36" rx="18" fill="rgba(255,255,255,0.05)"/>
    <circle cx="22" cy="18" r="5" fill="rgba(239,68,68,0.7)"/>
    <circle cx="42" cy="18" r="5" fill="rgba(251,191,36,0.7)"/>
    <circle cx="62" cy="18" r="5" fill="rgba(34,197,94,0.7)"/>
    <text x="90" y="23" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.55)">videollamada · revisión de tu web</text>

    <!-- main participant -->
    <rect x="18" y="52" width="240" height="200" rx="12" fill="rgba(139,92,246,0.14)" stroke="rgba(139,92,246,0.4)"/>
    <circle cx="138" cy="130" r="36" fill="rgba(139,92,246,0.45)"/>
    <path d="M88 232 Q138 182 188 232" fill="rgba(139,92,246,0.45)"/>
    <text x="30" y="240" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.7)">Latech · Badajoz</text>

    <!-- second participant -->
    <rect x="270" y="52" width="112" height="94" rx="10" fill="rgba(59,130,246,0.14)" stroke="rgba(59,130,246,0.4)"/>
    <circle cx="326" cy="90" r="18" fill="rgba(59,130,246,0.5)"/>
    <path d="M300 140 Q326 116 352 140" fill="rgba(59,130,246,0.5)"/>
    <text x="278" y="138" font-family="ui-monospace,monospace" font-size="8" fill="rgba(255,255,255,0.7)">Cliente · Bilbao</text>

    <!-- shared screen mini -->
    <rect x="270" y="158" width="112" height="94" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)"/>
    <rect x="282" y="172" width="60" height="8" rx="3" fill="rgba(255,255,255,0.4)"/>
    <rect x="282" y="188" width="88" height="5" rx="2" fill="rgba(255,255,255,0.18)"/>
    <rect x="282" y="200" width="74" height="5" rx="2" fill="rgba(255,255,255,0.18)"/>
    <rect x="282" y="216" width="46" height="16" rx="8" fill="rgba(139,92,246,0.7)"/>
    <text x="278" y="246" font-family="ui-monospace,monospace" font-size="8" fill="rgba(255,255,255,0.55)">pantalla: tu web</text>

    <!-- call controls -->
    <g transform="translate(150,272)">
      <circle cx="0" cy="12" r="14" fill="rgba(255,255,255,0.08)"/>
      <circle cx="50" cy="12" r="14" fill="rgba(255,255,255,0.08)"/>
      <circle cx="100" cy="12" r="14" fill="rgba(239,68,68,0.7)"/>
    </g>
  </g>

  <!-- Right: Spain network -->
  <g transform="translate(530,110)">
    <rect width="190" height="280" rx="16" fill="rgba(7,5,14,0.85)" stroke="rgba(139,92,246,0.45)"/>
    <text x="95" y="38" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.55)" letter-spacing="2">TODA ESPAÑA</text>

    <!-- abstract dot map -->
    <g>
      <circle cx="60" cy="160" r="7" fill="#8B5CF6"/>
      <text x="60" y="186" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="rgba(255,255,255,0.6)">Badajoz</text>
      <circle cx="120" cy="80" r="5" fill="rgba(59,130,246,0.9)"/>
      <circle cx="150" cy="120" r="5" fill="rgba(59,130,246,0.9)"/>
      <circle cx="100" cy="120" r="5" fill="rgba(59,130,246,0.9)"/>
      <circle cx="140" cy="210" r="5" fill="rgba(59,130,246,0.9)"/>
      <circle cx="50" cy="80" r="5" fill="rgba(59,130,246,0.9)"/>
      <g stroke="rgba(139,92,246,0.5)" stroke-width="1.5" stroke-dasharray="4 4">
        <path d="M60 160 L120 80" fill="none"/>
        <path d="M60 160 L150 120" fill="none"/>
        <path d="M60 160 L100 120" fill="none"/>
        <path d="M60 160 L140 210" fill="none"/>
        <path d="M60 160 L50 80" fill="none"/>
      </g>
    </g>

    <rect x="30" y="232" width="130" height="26" rx="13" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.5)"/>
    <text x="95" y="249" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#22C55E">100% en remoto</text>
  </g>
</svg>

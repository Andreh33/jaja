<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F0E04"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g2a" cx="0.2" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2b" cx="0.85" cy="0.7" r="0.55">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg2)"/>
  <rect width="800" height="500" fill="url(#g2a)"/>
  <rect width="800" height="500" fill="url(#g2b)"/>

  <!-- Left side: Marketplace -->
  <g transform="translate(80,140)" opacity="0.85">
    <text x="0" y="0" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="3">MARKETPLACE</text>
    <rect x="0" y="20" width="280" height="180" rx="14" fill="rgba(7,5,14,0.7)" stroke="rgba(255,255,255,0.12)"/>
    <!-- products grid -->
    <g transform="translate(20,40)">
      <rect x="0" y="0" width="70" height="70" rx="8" fill="rgba(249,115,22,0.18)"/>
      <rect x="80" y="0" width="70" height="70" rx="8" fill="rgba(249,115,22,0.12)"/>
      <rect x="160" y="0" width="70" height="70" rx="8" fill="rgba(249,115,22,0.18)"/>
      <rect x="0" y="80" width="70" height="70" rx="8" fill="rgba(249,115,22,0.12)"/>
      <rect x="80" y="80" width="70" height="70" rx="8" fill="rgba(249,115,22,0.18)"/>
      <rect x="160" y="80" width="70" height="70" rx="8" fill="rgba(249,115,22,0.12)"/>
    </g>
    <text x="20" y="225" font-family="ui-monospace,monospace" font-size="11" fill="rgba(239,68,68,0.85)">−15% comisión por venta</text>
  </g>

  <!-- VS divider -->
  <g transform="translate(395,235)">
    <circle cx="0" cy="0" r="32" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.2)"/>
    <text x="0" y="6" text-anchor="middle" font-family="Inter,system-ui" font-size="16" font-weight="800" fill="rgba(255,255,255,0.85)" letter-spacing="2">VS</text>
  </g>

  <!-- Right side: Tienda propia -->
  <g transform="translate(450,140)" opacity="0.95">
    <text x="0" y="0" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="#F97316" letter-spacing="3">TIENDA PROPIA</text>
    <rect x="0" y="20" width="280" height="180" rx="14" fill="rgba(7,5,14,0.85)" stroke="rgba(249,115,22,0.45)"/>
    <!-- branded product -->
    <g transform="translate(20,40)">
      <rect x="0" y="0" width="240" height="100" rx="10" fill="rgba(249,115,22,0.25)"/>
      <rect x="0" y="0" width="240" height="100" rx="10" fill="none" stroke="rgba(249,115,22,0.6)" stroke-width="1.5"/>
      <circle cx="40" cy="50" r="20" fill="rgba(255,255,255,0.85)"/>
      <rect x="80" y="35" width="120" height="10" rx="3" fill="rgba(255,255,255,0.85)"/>
      <rect x="80" y="55" width="80" height="6" rx="2" fill="rgba(255,255,255,0.4)"/>
    </g>
    <g transform="translate(20,160)">
      <rect x="0" y="0" width="80" height="22" rx="11" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.5)"/>
      <text x="40" y="15" text-anchor="middle" font-family="Inter,system-ui" font-size="10" font-weight="700" fill="#22C55E">100% margen</text>
    </g>
    <text x="20" y="205" font-family="ui-monospace,monospace" font-size="11" fill="rgba(34,197,94,0.85)">+ Cliente tuyo · + Marca · + SEO</text>
  </g>
</svg>

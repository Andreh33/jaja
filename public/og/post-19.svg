      <rect x="20" y="62" width="260" height="34" rx="8" fill="rgba(139,92,246,0.5)"/>
      <text x="34" y="84" font-family="ui-monospace,monospace" font-size="12" fill="#FFFFFF">09:00 · color + corte</text>
      <rect x="20" y="104" width="260" height="34" rx="8" fill="rgba(139,92,246,0.4)"/>

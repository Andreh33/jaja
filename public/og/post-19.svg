  </defs>
  <rect width="800" height="500" fill="url(#bg19)"/>
  <rect width="800" height="500" fill="url(#g19a)"/>
  <rect width="800" height="500" fill="url(#g19b)"/>

  <!-- Booking agenda mockup -->

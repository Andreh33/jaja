      <text x="34" y="168" font-family="ui-monospace,monospace" font-size="12" fill="#FFFFFF">12:30 · balayage</text>
      <rect x="20" y="188" width="260" height="34" rx="8" fill="rgba(249,115,22,0.55)"/>
      <text x="34" y="210" font-family="ui-monospace,monospace" font-size="12" fill="#FFFFFF">16:00 · tratamiento</text>

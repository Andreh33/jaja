      <text x="34" y="252" font-family="ui-monospace,monospace" font-size="12" fill="#FFFFFF">18:00 · corte</text>
    </g>
    <text x="20" y="300" font-family="ui-monospace,monospace" font-size="11" fill="rgba(34,197,94,0.85)">agenda completa ✓ reservas 24/7</text>
  </g>

  <!-- Scissors flat icon -->
  <g transform="translate(560,180)" opacity="0.9">
    <circle cx="-26" cy="34" r="14" fill="none" stroke="#F97316" stroke-width="4"/>
    <circle cx="26" cy="34" r="14" fill="none" stroke="#F97316" stroke-width="4"/>
    <line x1="-18" y1="22" x2="30" y2="-44" stroke="#F97316" stroke-width="4" stroke-linecap="round"/>
    <line x1="18" y1="22" x2="-30" y2="-44" stroke="#F97316" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Instagram -> web flow -->
  <g transform="translate(490,300)" opacity="0.88">
    <rect x="0" y="0" width="64" height="64" rx="16" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2.5"/>
    <circle cx="32" cy="32" r="14" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2.5"/>
    <circle cx="50" cy="14" r="4" fill="rgba(255,255,255,0.4)"/>
    <path d="M76 32 H128" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="5 5"/>
    <path d="M122 26 l8 6 l-8 6" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round"/>
    <rect x="140" y="8" width="80" height="48" rx="10" fill="rgba(7,5,14,0.85)" stroke="rgba(139,92,246,0.7)" stroke-width="1.5"/>
    <text x="180" y="37" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#8B5CF6">tu web</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg45" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g45a" cx="0.8" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g45b" cx="0.2" cy="0.75" r="0.55">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg45)"/>
  <rect width="800" height="500" fill="url(#g45a)"/>
  <rect width="800" height="500" fill="url(#g45b)"/>

  <!-- Growth chart card -->
  <g transform="translate(130,85)" opacity="0.95">
    <rect x="0" y="0" width="540" height="330" rx="18" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.14)"/>
    <text x="32" y="42" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.5)" letter-spacing="3">TRAFICO ORGANICO · 12 MESES</text>

    <!-- axes -->
    <g transform="translate(50,70)">
      <line x1="0" y1="0" x2="0" y2="190" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <line x1="0" y1="190" x2="450" y2="190" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

      <!-- grid -->
      <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
        <line x1="0" y1="48" x2="450" y2="48"/>
        <line x1="0" y1="95" x2="450" y2="95"/>
        <line x1="0" y1="142" x2="450" y2="142"/>
      </g>

      <!-- phase zones -->
      <rect x="0" y="0" width="112" height="190" fill="rgba(239,68,68,0.05)"/>
      <rect x="112" y="0" width="113" height="190" fill="rgba(251,191,36,0.05)"/>
      <rect x="225" y="0" width="225" height="190" fill="rgba(34,197,94,0.06)"/>

      <!-- hockey stick curve -->
      <path d="M0 186 C 60 184, 90 180, 120 172 C 160 161, 190 148, 230 124 C 280 94, 330 64, 380 36 C 405 23, 430 14, 450 8"
            fill="none" stroke="#8B5CF6" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="450" cy="8" r="6" fill="#8B5CF6"/>
      <circle cx="450" cy="8" r="2.5" fill="#fff"/>

      <!-- phase markers -->
      <circle cx="120" cy="172" r="4" fill="#FBBF24"/>
      <circle cx="230" cy="124" r="4" fill="#22C55E"/>

      <!-- month labels -->
      <g font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.45)">
        <text x="0" y="208">M1</text>
        <text x="105" y="208">M3</text>
        <text x="218" y="208">M6</text>
        <text x="330" y="208">M9</text>
        <text x="432" y="208">M12</text>
      </g>

      <!-- phase labels -->
      <g font-family="ui-monospace,monospace" font-size="9">
        <text x="10" y="16" fill="rgba(239,68,68,0.8)">base tecnica</text>
        <text x="122" y="16" fill="rgba(251,191,36,0.85)">long-tails</text>
        <text x="290" y="16" fill="rgba(34,197,94,0.85)">bola de nieve</text>
      </g>
    </g>

    <!-- annotation -->
    <g transform="translate(330,260)">
      <rect x="0" y="0" width="178" height="40" rx="10" fill="rgba(139,92,246,0.16)" stroke="rgba(139,92,246,0.5)"/>
      <text x="14" y="17" font-family="Inter,system-ui" font-size="10" font-weight="700" fill="#fff">Sin atajos, sin humo</text>
      <text x="14" y="31" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.55)">resultados: 4-12 meses</text>
    </g>
  </g>

  <text x="400" y="458" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="rgba(255,255,255,0.55)" letter-spacing="3">PLAZOS REALES DEL SEO</text>
</svg>

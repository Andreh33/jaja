<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g1a" cx="0.25" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g1b" cx="0.8" cy="0.7" r="0.5">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brokenLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg1)"/>
  <rect width="800" height="500" fill="url(#g1a)"/>
  <rect width="800" height="500" fill="url(#g1b)"/>

  <!-- Browser window mockup that's "broken" -->
  <g transform="translate(140,90)" opacity="0.85">
    <rect x="0" y="0" width="520" height="320" rx="14" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <rect x="0" y="0" width="520" height="38" rx="14" fill="rgba(255,255,255,0.04)"/>
    <circle cx="20" cy="19" r="4" fill="#EF4444"/>
    <circle cx="36" cy="19" r="4" fill="#FBBF24"/>
    <circle cx="52" cy="19" r="4" fill="#22C55E"/>
    <rect x="80" y="11" width="200" height="16" rx="8" fill="rgba(255,255,255,0.08)"/>

    <!-- "Broken" lines/bars -->
    <rect x="30" y="70" width="200" height="14" rx="4" fill="rgba(255,255,255,0.18)"/>
    <rect x="30" y="100" width="280" height="10" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="30" y="120" width="240" height="10" rx="3" fill="rgba(255,255,255,0.08)"/>

    <!-- Loading bar (slow) -->
    <rect x="30" y="160" width="460" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="30" y="160" width="120" height="6" rx="3" fill="url(#brokenLine)"/>
    <text x="30" y="190" font-family="ui-monospace,monospace" font-size="11" fill="rgba(239,68,68,0.7)">Loading… 8.4s</text>

    <!-- "Lost clients" symbols -->
    <g transform="translate(30,220)" opacity="0.9">
      <circle cx="0" cy="0" r="14" fill="rgba(239,68,68,0.18)" stroke="rgba(239,68,68,0.5)"/>
      <text x="0" y="4" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#EF4444" font-weight="bold">↓</text>
    </g>
    <text x="60" y="226" font-family="Inter,system-ui" font-size="14" fill="rgba(255,255,255,0.7)" font-weight="600">53% bounce rate</text>

    <!-- Bar chart bars dying -->
    <g transform="translate(310,200)">
      <rect x="0" y="40" width="14" height="40" rx="2" fill="rgba(59,130,246,0.5)"/>
      <rect x="20" y="60" width="14" height="20" rx="2" fill="rgba(59,130,246,0.4)"/>
      <rect x="40" y="70" width="14" height="10" rx="2" fill="rgba(239,68,68,0.5)"/>
      <rect x="60" y="74" width="14" height="6" rx="2" fill="rgba(239,68,68,0.4)"/>
    </g>
  </g>

  <!-- Glow halo -->
  <circle cx="640" cy="120" r="80" fill="#3B82F6" opacity="0.3" filter="blur(40)"/>
</svg>

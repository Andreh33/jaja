<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg30" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g30a" cx="0.25" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g30b" cx="0.8" cy="0.75" r="0.55">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg30)"/>
  <rect width="800" height="500" fill="url(#g30a)"/>
  <rect width="800" height="500" fill="url(#g30b)"/>

  <!-- Left: product card with garment -->
  <g transform="translate(90,90)">
    <text x="0" y="0" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="3">MODA ONLINE</text>
    <rect x="0" y="20" width="250" height="300" rx="14" fill="rgba(7,5,14,0.8)" stroke="rgba(139,92,246,0.4)"/>
    <!-- garment illustration (dress) -->
    <g transform="translate(125,120)">
      <path d="M-22 -62 L-10 -52 L0 -58 L10 -52 L22 -62 L30 -44 L16 -36 L26 50 L-26 50 L-16 -36 L-30 -44 Z" fill="rgba(139,92,246,0.45)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    </g>
    <text x="22" y="220" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="#fff">Vestido midi lino</text>
    <text x="22" y="240" font-family="ui-monospace,monospace" font-size="12" fill="rgba(251,191,36,0.9)">49,95€</text>
    <!-- size chips -->
    <g transform="translate(22,256)">
      <rect x="0" y="0" width="34" height="24" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)"/>
      <text x="17" y="16" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.6)">XS</text>
      <rect x="42" y="0" width="34" height="24" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)"/>
      <text x="59" y="16" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.6)">S</text>
      <rect x="84" y="0" width="34" height="24" rx="6" fill="rgba(139,92,246,0.4)" stroke="rgba(139,92,246,0.8)"/>
      <text x="101" y="16" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#fff">M</text>
      <rect x="126" y="0" width="34" height="24" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)"/>
      <text x="143" y="16" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.6)">L</text>
      <rect x="168" y="0" width="34" height="24" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)"/>
      <text x="185" y="16" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.6)">XL</text>
    </g>
  </g>

  <!-- Right: keys panel -->
  <g transform="translate(430,120)">
    <rect x="0" y="0" width="290" height="64" rx="12" fill="rgba(7,5,14,0.8)" stroke="rgba(255,255,255,0.12)"/>
    <text x="20" y="27" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.55)">GUÍA DE TALLAS REAL</text>
    <text x="20" y="48" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="#fff">−10% devoluciones</text>

    <rect x="0" y="80" width="290" height="64" rx="12" fill="rgba(7,5,14,0.8)" stroke="rgba(255,255,255,0.12)"/>
    <text x="20" y="107" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.55)">FOTOS CON CRITERIO</text>
    <text x="20" y="128" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="#fff">la foto es el producto</text>

    <rect x="0" y="160" width="290" height="64" rx="12" fill="rgba(7,5,14,0.8)" stroke="rgba(255,255,255,0.12)"/>
    <text x="20" y="187" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.55)">FICHAS QUE POSICIONAN</text>
    <text x="20" y="208" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="#fff">tráfico gratis de Google</text>

    <g transform="translate(0,244)">
      <rect x="0" y="0" width="180" height="28" rx="14" fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.5)"/>
      <text x="90" y="18" text-anchor="middle" font-family="Inter,system-ui" font-size="11" font-weight="700" fill="#22C55E">checkout con Bizum</text>
    </g>
  </g>
</svg>

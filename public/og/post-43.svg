    <g transform="translate(20,64)">
      <rect x="0" y="0" width="210" height="64" rx="10" fill="rgba(249,115,22,0.14)" stroke="rgba(249,115,22,0.45)"/>
      <text x="12" y="20" font-family="Inter,system-ui" font-size="11" font-weight="700" fill="#fff">Tu tienda online</text>
      <text x="12" y="38" font-family="ui-monospace,monospace" font-size="9" fill="#FBBF24">★★★★★ 4.8 · 89,95 € · stock</text>
      <text x="12" y="54" font-family="ui-monospace,monospace" font-size="8" fill="rgba(255,255,255,0.45)">schema: Product</text>

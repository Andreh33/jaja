  <!-- SERP rich result panel -->
  <g transform="translate(430,115)" opacity="0.95">
    <rect x="0" y="0" width="250" height="270" rx="14" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.13)"/>
    <rect x="20" y="18" width="210" height="30" rx="15" fill="rgba(255,255,255,0.06)"/>
    <circle cx="36" cy="33" r="5.5" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <line x1="41" y1="38" x2="47" y2="44" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <text x="54" y="37" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.5)">comprar zapatillas</text>


    <text x="120" y="226" font-family="ui-monospace,monospace" font-size="9" fill="#22C55E">en stock</text>
    <rect x="22" y="244" width="206" height="36" rx="18" fill="rgba(139,92,246,0.25)" stroke="rgba(139,92,246,0.6)"/>
    <text x="125" y="267" text-anchor="middle" font-family="Inter,system-ui" font-size="12" font-weight="700" fill="#fff">Comprar</text>

      <rect x="12" y="13" width="100" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
      <rect x="12" y="27" width="150" height="5" rx="2.5" fill="rgba(255,255,255,0.1)"/>
    </g>
    <text x="20" y="256" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.4)">+CTR con resultado enriquecido</text>

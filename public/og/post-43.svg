    <text x="22" y="178" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="#fff">Ficha de producto</text>
    <text x="22" y="198" font-family="ui-monospace,monospace" font-size="10" fill="#FBBF24">★★★★★ 4.8 (214)</text>

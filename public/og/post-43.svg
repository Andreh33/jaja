    <!-- sneaker silhouette -->
    <g transform="translate(55,55)" opacity="0.9">
      <path d="M0 60 L8 38 Q14 24 28 22 L52 20 Q66 19 76 28 L104 50 Q126 56 138 60 L140 70 Q140 76 132 76 L6 76 Q0 76 0 70 Z" fill="rgba(249,115,22,0.55)"/>

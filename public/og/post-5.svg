<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F1604"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g5a" cx="0.3" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g5b" cx="0.8" cy="0.7" r="0.55">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg5)"/>
  <rect width="800" height="500" fill="url(#g5a)"/>
  <rect width="800" height="500" fill="url(#g5b)"/>

  <!-- Stripe-style payment card -->
  <g transform="translate(140,120)">
    <rect x="0" y="0" width="320" height="200" rx="20" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.12)"/>
    <defs>
      <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#635BFF"/>
        <stop offset="100%" stop-color="#0A2540"/>
      </linearGradient>
    </defs>
    <text x="24" y="46" font-family="Inter,system-ui" font-size="13" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="2">stripe</text>

    <!-- chip -->
    <rect x="24" y="72" width="44" height="34" rx="6" fill="rgba(255,255,255,0.85)"/>
    <rect x="30" y="78" width="32" height="22" rx="3" fill="rgba(255,200,100,0.7)"/>

    <!-- card number -->
    <text x="24" y="138" font-family="ui-monospace,monospace" font-size="14" fill="rgba(255,255,255,0.85)" letter-spacing="3">•••• •••• •••• 4242</text>

    <!-- bottom info -->
    <text x="24" y="175" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.6)">PAGADO · 50,00€</text>
    <text x="220" y="175" font-family="ui-monospace,monospace" font-size="9" fill="rgba(255,255,255,0.6)">12/29</text>
  </g>

  <!-- Right column: payment success -->
  <g transform="translate(500,120)">
    <rect x="0" y="0" width="220" height="200" rx="14" fill="rgba(7,5,14,0.85)" stroke="rgba(34,197,94,0.4)"/>

    <!-- check circle -->
    <g transform="translate(110,60)">
      <circle cx="0" cy="0" r="32" fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.7)" stroke-width="2"/>
      <path d="M-12 0 L-3 9 L13 -9" stroke="#22C55E" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <text x="110" y="120" text-anchor="middle" font-family="Inter,system-ui" font-size="14" font-weight="700" fill="#fff">Pago completado</text>
    <text x="110" y="140" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.55)">1.4% + 0.25€ comisión</text>

    <g transform="translate(20,160)">
      <rect x="0" y="0" width="60" height="22" rx="11" fill="rgba(99,91,255,0.18)" stroke="rgba(99,91,255,0.4)"/>
      <text x="30" y="15" text-anchor="middle" font-family="Inter,system-ui" font-size="9" font-weight="700" fill="#9090FF">Bizum</text>
    </g>
    <g transform="translate(85,160)">
      <rect x="0" y="0" width="50" height="22" rx="11" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.25)"/>
      <text x="25" y="15" text-anchor="middle" font-family="Inter,system-ui" font-size="9" font-weight="700" fill="#fff"></text>
    </g>
    <g transform="translate(140,160)">
      <rect x="0" y="0" width="60" height="22" rx="11" fill="rgba(251,191,36,0.18)" stroke="rgba(251,191,36,0.5)"/>
      <text x="30" y="15" text-anchor="middle" font-family="Inter,system-ui" font-size="9" font-weight="700" fill="#FBBF24">Visa</text>
    </g>
  </g>
</svg>

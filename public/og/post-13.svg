<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg13" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1A14"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g13a" cx="0.25" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g13b" cx="0.85" cy="0.7" r="0.55">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg13)"/>
  <rect width="800" height="500" fill="url(#g13a)"/>
  <rect width="800" height="500" fill="url(#g13b)"/>

  <!-- Voice card -->
  <g transform="translate(80,120)">
    <rect width="300" height="260" rx="18" fill="rgba(7,5,14,0.88)" stroke="rgba(16,185,129,0.55)"/>
    <text x="24" y="40" font-family="Inter,system-ui" font-size="12" font-weight="700" fill="#10B981" letter-spacing="3">VOZ</text>

    <g transform="translate(150,130)">
      <circle r="56" fill="none" stroke="rgba(16,185,129,0.25)"/>
      <circle r="40" fill="none" stroke="rgba(16,185,129,0.45)"/>
      <circle r="24" fill="rgba(7,5,14,0.92)" stroke="rgba(16,185,129,0.85)" stroke-width="2"/>
      <path d="M -6 -8 L -6 8 M 0 -10 L 0 10 M 6 -8 L 6 8" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
    </g>

    <g font-family="ui-monospace,monospace" font-size="11">
      <g transform="translate(24,210)">
        <rect width="252" height="28" rx="8" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.4)"/>
        <text x="14" y="18" fill="rgba(255,255,255,0.85)">📞 24/7 · sin esperas</text>
      </g>
    </g>
  </g>

  <!-- VS -->
  <g transform="translate(400,250)">
    <circle r="36" fill="rgba(7,5,14,0.92)" stroke="rgba(255,255,255,0.25)"/>
    <text y="6" text-anchor="middle" font-family="Inter,system-ui" font-size="16" font-weight="800" fill="#fff" letter-spacing="2">VS</text>
  </g>

  <!-- Chat card -->
  <g transform="translate(450,120)">
    <rect width="300" height="260" rx="18" fill="rgba(7,5,14,0.88)" stroke="rgba(59,130,246,0.55)"/>
    <text x="24" y="40" font-family="Inter,system-ui" font-size="12" font-weight="700" fill="#3B82F6" letter-spacing="3">CHATBOT</text>

    <g font-family="Inter,system-ui" font-size="10">
      <g transform="translate(24,64)">
        <rect width="160" height="28" rx="14" fill="rgba(255,255,255,0.08)"/>
        <text x="14" y="18" fill="rgba(255,255,255,0.85)">Hola, ¿precios?</text>
      </g>
      <g transform="translate(116,100)">
        <rect width="160" height="28" rx="14" fill="rgba(59,130,246,0.25)"/>
        <text x="14" y="18" fill="#fff">Te paso PDF</text>
      </g>
      <g transform="translate(24,136)">
        <rect width="160" height="28" rx="14" fill="rgba(255,255,255,0.08)"/>
        <text x="14" y="18" fill="rgba(255,255,255,0.85)">¿Demo?</text>
      </g>
      <g transform="translate(116,172)">
        <rect width="160" height="46" rx="14" fill="rgba(59,130,246,0.25)"/>
        <text x="14" y="18" fill="#fff">Reserva aquí 👇</text>
        <text x="14" y="36" fill="rgba(255,255,255,0.7)">latech.es/demo</text>
      </g>
    </g>

    <g font-family="ui-monospace,monospace" font-size="11">
      <g transform="translate(24,228)">
        <rect width="252" height="20" rx="8" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.4)"/>
        <text x="14" y="14" fill="rgba(255,255,255,0.85)">⚡ asincrono · barato</text>
      </g>
    </g>
  </g>

  <text x="400" y="460" text-anchor="middle" font-family="Inter,system-ui" font-size="11" font-weight="700" fill="rgba(255,255,255,0.45)" letter-spacing="4">VOZ vs CHAT · ¿CUÁL GANA?</text>
</svg>

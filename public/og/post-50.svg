<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg50" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g50a" cx="0.2" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g50b" cx="0.8" cy="0.65" r="0.55">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg50)"/>
  <rect width="800" height="500" fill="url(#g50a)"/>
  <rect width="800" height="500" fill="url(#g50b)"/>

  <!-- VS divider -->
  <g transform="translate(400,250)">
    <circle r="34" fill="rgba(7,5,14,0.95)" stroke="rgba(139,92,246,0.6)" stroke-width="2"/>
    <text x="0" y="7" text-anchor="middle" font-family="Inter,system-ui" font-size="20" font-weight="800" fill="#fff">VS</text>
  </g>

  <!-- Left: WordPress panel -->
  <g transform="translate(80,110)">
    <rect width="270" height="280" rx="16" fill="rgba(7,5,14,0.85)" stroke="rgba(249,115,22,0.45)"/>
    <text x="24" y="42" font-family="Inter,system-ui" font-size="18" font-weight="800" fill="#fff">WordPress</text>
    <text x="24" y="64" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="2">PLUGINS + PHP</text>

    <g font-family="ui-monospace,monospace" font-size="11">
      <text x="24" y="104" fill="rgba(255,255,255,0.75)">PageSpeed móvil</text>
      <rect x="24" y="114" width="222" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>
      <rect x="24" y="114" width="110" height="10" rx="5" fill="rgba(249,115,22,0.8)"/>
      <text x="24" y="148" fill="rgba(255,255,255,0.55)">~52/100</text>

      <text x="24" y="190" fill="rgba(255,255,255,0.7)">⚠ 27 plugins activos</text>
      <text x="24" y="216" fill="rgba(255,255,255,0.7)">⚠ Actualizar cada semana</text>
      <text x="24" y="242" fill="rgba(255,255,255,0.7)">⚠ Panel expuesto</text>
    </g>
  </g>

  <!-- Right: Next.js panel -->
  <g transform="translate(450,110)">
    <rect width="270" height="280" rx="16" fill="rgba(7,5,14,0.85)" stroke="rgba(59,130,246,0.55)"/>
    <text x="24" y="42" font-family="Inter,system-ui" font-size="18" font-weight="800" fill="#fff">Next.js</text>
    <text x="24" y="64" font-family="ui-monospace,monospace" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="2">A MEDIDA · CDN</text>

    <g font-family="ui-monospace,monospace" font-size="11">
      <text x="24" y="104" fill="rgba(255,255,255,0.75)">PageSpeed móvil</text>
      <rect x="24" y="114" width="222" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>
      <rect x="24" y="114" width="213" height="10" rx="5" fill="rgba(34,197,94,0.85)"/>
      <text x="24" y="148" fill="rgba(255,255,255,0.55)">~96/100</text>

      <text x="24" y="190" fill="rgba(255,255,255,0.7)">✓ Sin plugins</text>
      <text x="24" y="216" fill="rgba(255,255,255,0.7)">✓ Estática y segura</text>
      <text x="24" y="242" fill="rgba(255,255,255,0.7)">✓ Carga global CDN</text>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg17" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#07050E"/>
    </linearGradient>
    <radialGradient id="g17a" cx="0.25" cy="0.25" r="0.6">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g17b" cx="0.8" cy="0.75" r="0.55">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg17)"/>
  <rect width="800" height="500" fill="url(#g17a)"/>
  <rect width="800" height="500" fill="url(#g17b)"/>

  <!-- Phone mockup with digital menu -->
  <g transform="translate(150,70)" opacity="0.9">
    <rect x="0" y="0" width="200" height="360" rx="24" fill="rgba(7,5,14,0.9)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <rect x="70" y="12" width="60" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="20" y="56" font-family="ui-monospace,monospace" font-size="12" fill="#F97316" font-weight="bold">CARTA</text>
    <!-- menu items -->
    <rect x="20" y="74" width="120" height="9" rx="3" fill="rgba(255,255,255,0.18)"/>
    <rect x="156" y="74" width="24" height="9" rx="3" fill="rgba(249,115,22,0.5)"/>
    <rect x="20" y="98" width="100" height="9" rx="3" fill="rgba(255,255,255,0.12)"/>
    <rect x="156" y="98" width="24" height="9" rx="3" fill="rgba(249,115,22,0.4)"/>
    <rect x="20" y="122" width="130" height="9" rx="3" fill="rgba(255,255,255,0.12)"/>
    <rect x="156" y="122" width="24" height="9" rx="3" fill="rgba(249,115,22,0.4)"/>
    <rect x="20" y="146" width="90" height="9" rx="3" fill="rgba(255,255,255,0.12)"/>
    <rect x="156" y="146" width="24" height="9" rx="3" fill="rgba(249,115,22,0.4)"/>
    <!-- plate illustration -->
    <circle cx="100" cy="225" r="42" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <circle cx="100" cy="225" r="28" fill="rgba(249,115,22,0.25)" stroke="rgba(249,115,22,0.6)" stroke-width="1.5"/>
    <!-- reserve button -->
    <rect x="20" y="295" width="160" height="38" rx="10" fill="rgba(249,115,22,0.85)"/>
    <text x="100" y="319" text-anchor="middle" font-family="Inter,system-ui" font-size="14" font-weight="700" fill="#07050E">Reservar mesa</text>
  </g>

  <!-- Map pin + reservation card -->
  <g transform="translate(440,110)" opacity="0.88">
    <rect x="0" y="0" width="220" height="120" rx="14" fill="rgba(7,5,14,0.85)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <text x="18" y="32" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.6)">reserva confirmada</text>
    <rect x="18" y="46" width="130" height="10" rx="3" fill="rgba(255,255,255,0.16)"/>
    <rect x="18" y="66" width="90" height="10" rx="3" fill="rgba(255,255,255,0.1)"/>
    <circle cx="190" cy="88" r="14" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.7)" stroke-width="1.5"/>
    <path d="M184 88 l4 5 l8 -10" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="18" y="96" font-family="ui-monospace,monospace" font-size="11" fill="#FBBF24">viernes 21:00 · 4 pax</text>
  </g>

  <!-- Google maps pin -->
  <g transform="translate(540,300)" opacity="0.9">
    <path d="M0 -34 C-19 -34 -34 -19 -34 0 C-34 22 0 52 0 52 C0 52 34 22 34 0 C34 -19 19 -34 0 -34 Z" fill="rgba(251,191,36,0.25)" stroke="#FBBF24" stroke-width="2"/>
    <circle cx="0" cy="-2" r="11" fill="#FBBF24"/>
    <text x="0" y="86" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.55)">SEO local · Google Maps</text>
  </g>

  <!-- stars -->
  <g transform="translate(440,270)" fill="#FBBF24" opacity="0.85">
    <text x="0" y="0" font-family="Inter,system-ui" font-size="16">★★★★★</text>
    <text x="0" y="22" font-family="ui-monospace,monospace" font-size="11" fill="rgba(255,255,255,0.55)">4.8 · 213 reseñas</text>
  </g>

  <circle cx="680" cy="90" r="70" fill="#F97316" opacity="0.18"/>
</svg>
